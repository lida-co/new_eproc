<!DOCTYPE html>
<html ng-app="app" ng-controller="LayoutCtrl">
<head>
    <meta http-equiv="content-type" content="text/html;charset=UTF-8" />
    <meta charset="utf-8" />
    <title>{siteName}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <style>
        * { box-sizing: border-box; }
        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: #0B162C;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .logout-card {
            background: #ffffff;
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
            position: relative;
        }
        .brand-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 24px;
        }
        .brand-icon {
            background-color: #FEE2E2;
            color: #DC2626;
            width: 64px;
            height: 64px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
        }
        .brand-icon svg { width: 32px; height: 32px; }
        .logout-title {
            font-size: 24px;
            color: #1F2937;
            font-weight: 700;
            margin: 0 0 12px 0;
        }
        .logout-message {
            font-size: 15px;
            color: #4B5563;
            line-height: 1.5;
            margin-bottom: 32px;
        }
        .btn-primary {
            width: 100%;
            background: linear-gradient(135deg, #EF4444, #DC2626);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: opacity 0.2s, transform 0.1s;
        }
        .btn-primary:hover { opacity: 0.9; }
        .btn-primary:active { transform: translateY(1px); }
        .btn-secondary {
            display: inline-block;
            margin-top: 20px;
            color: #4B5563;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.2s;
        }
        .btn-secondary:hover { color: #1F2937; }
    </style>
</head>
<body>
    <div class="logout-card" ng-cloak>
        <div style="text-align: center; margin-bottom: 24px;">
            <img src="{siteUrl}/content/app/images/logo-mtf.png" alt="Mandiri Tunas Finance" style="max-height: 60px; width: auto; object-fit: contain;" />
        </div>
        <div class="brand-header">
            <div class="brand-icon">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
                </svg>
            </div>
            <h1 class="logout-title">Konfirmasi Logout</h1>
        </div>

        <p class="logout-message">Apakah anda yakin ingin keluar dari aplikasi <strong>{{model.siteName}}</strong>?</p>

        <form name="form" method="post" action="{{model.logoutUrl}}">
            <anti-forgery-token token="model.antiForgery"></anti-forgery-token>
            <button type="submit" class="btn-primary">
                Ya, Keluar
                <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
                </svg>
            </button>
        </form>
        
        <a href="#" class="btn-secondary btn-back">Batal, kembali ke aplikasi</a>
    </div>

    <script id='modelJson' type='application/json'>
        {model}
    </script>
    <script src="{siteUrl}/content/libs/angular/angular.1.2.13.min.js"></script>
    <script src="{siteUrl}/content/libs/encoder/encoder.min.js"></script>
    <script src="{siteUrl}/content/app/app.js"></script>
</body>
</html>
