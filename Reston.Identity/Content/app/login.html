<!DOCTYPE html>
<html ng-app="app" ng-controller="LayoutCtrl">

<head>
    <meta http-equiv="content-type" content="text/html;charset=UTF-8" />
    <meta charset="utf-8" />
    <title>{siteName}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <style>
        * {
            box-sizing: border-box;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: #0B162C;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: #ffffff;
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            position: relative;
        }

        .brand-header {
            display: flex;
            align-items: center;
            margin-bottom: 30px;
        }

        .brand-icon {
            background-color: #2563EB;
            color: white;
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            flex-shrink: 0;
        }

        .brand-icon svg {
            width: 24px;
            height: 24px;
        }

        .brand-text h1 {
            margin: 0;
            font-size: 14px;
            color: #2563EB;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .brand-text h2 {
            margin: 2px 0 0 0;
            font-size: 18px;
            color: #1F2937;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #374151;
            font-weight: 500;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .form-control {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #E5E7EB;
            border-radius: 8px;
            font-size: 14px;
            color: #1F2937;
            transition: border-color 0.2s, box-shadow 0.2s;
            background-color: #F9FAFB;
        }

        .form-control::placeholder {
            color: #9CA3AF;
        }

        .form-control:focus {
            outline: none;
            border-color: #2563EB;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
            background-color: #ffffff;
        }

        .input-wrapper .icon-right {
            position: absolute;
            right: 12px;
            color: #9CA3AF;
            cursor: pointer;
            display: flex;
        }

        .captcha-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .captcha-box {
            background: #EFF6FF;
            border: 1px solid #BFDBFE;
            border-radius: 8px;
            height: 44px;
            width: 130px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0;
        }

        .captcha-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .btn-refresh {
            background: #ffffff;
            border: 1px solid #E5E7EB;
            border-radius: 8px;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #6B7280;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .btn-refresh:hover {
            background: #F3F4F6;
            color: #374151;
        }

        .captcha-input {
            flex: 1;
        }

        .captcha-input input {
            height: 44px;
        }

        .btn-primary {
            width: 100%;
            background: linear-gradient(135deg, #2563EB, #1D4ED8);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: opacity 0.2s, transform 0.1s;
            margin-top: 30px;
        }

        .btn-primary:hover {
            opacity: 0.9;
        }

        .btn-primary:active {
            transform: translateY(1px);
        }

        .footer-links {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 24px;
            gap: 16px;
            font-size: 13px;
        }

        .footer-links a {
            color: #2563EB;
            text-decoration: none;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .footer-links a:hover {
            text-decoration: underline;
        }

        .footer-links .divider {
            width: 1px;
            height: 14px;
            background-color: #D1D5DB;
        }

        .alert {
            background-color: #FEE2E2;
            border: 1px solid #F87171;
            color: #991B1B;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        [type="password"] {
            /* font-family: caption; */
        }
    </style>
</head>

<body>
    <div class="login-card">
        <div class="brand-header" style="justify-content: center; padding-bottom: 10px; flex-direction: column;">
            <img src="{siteUrl}/content/app/images/logo-mtf.png" alt="Mandiri Tunas Finance"
                style="max-height: 80px; width: auto; object-fit: contain;" />
            <h2 style="margin: 12px 0 0 0; font-size: 18px; color: #1F2937; font-weight: 600; text-align: center;">
                e-Procurement</h2>
        </div>

        <form id="form-login" method="post" ng-submit="login.submit()" action="{{model.loginUrl}}" autocomplete="off">
            <anti-forgery-token token="model.antiForgery"></anti-forgery-token>

            <div ng-show="model.errorMessage" class="ng-hide">
                <div class="alert" role="alert">
                    <strong>{{model.errorMessage}}</strong>
                </div>
            </div>

            <div class="form-group">
                <label>Login</label>
                <input type="text" name="usernamex" class="form-control" placeholder="Masukkan Login ID Anda"
                    ng-model="model.usernamex" required="">
                <input type="hidden" name="username" value="{{model.usernamex}}#{{model.captca}}#{{model.username}}">
            </div>

            <div class="form-group">
                <label>Password</label>
                <div class="input-wrapper">
                    <input type="password" id="pwd" name="password" class="form-control"
                        placeholder="Masukkan password Anda" ng-model="model.password" required="">
                    <div class="icon-right">
                        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z">
                            </path>
                        </svg>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label>Kode Verifikasi</label>
                <div class="captcha-row">
                    <div class="captcha-box">
                        <img id="captchaImage" src="{siteUrl}/Home/GetCaptchaImage?k={{model.username}}"
                            alt="Captcha" />
                    </div>
                    <button type="button" class="btn-refresh">
                        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15">
                            </path>
                        </svg>
                    </button>
                    <div class="captcha-input">
                        <input autocomplete="off" type="text" class="form-control" placeholder="Ketik kode"
                            ng-model="model.captca" required>
                    </div>
                </div>
            </div>

            <button type="submit" class="btn-primary">
                Login
                <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3">
                    </path>
                </svg>
            </button>

            <div class="footer-links">
                <a href="{procUrl}registrasiv2.html">Daftar Rekanan Baru
                    <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                    </svg>
                </a>
                <span class="divider"></span>
                <a href="{procUrl}lacak.html">Cek Status Pendaftaran
                    <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                    </svg>
                </a>
            </div>
        </form>
    </div>

    <script id='modelJson' type='application/json'>
        {model}
    </script>
    <script src="{siteUrl}/content/libs/angular/angular.1.2.13.min.js"></script>
    <script src="{siteUrl}/content/libs/encoder/encoder.min.js"></script>
    <script src="{siteUrl}/content/app/app.js"></script>
</body>

</html>
