        var waitingDialog = waitingDialog || (function ($) {
            'use strict';

            // Creating modal dialog's DOM
            var $loading = $(
                '<div class="modal fade" data-backdrop="static" data-keyboard="false" tabindex="-1" role="dialog" aria-hidden="true" style="padding-top:15%; overflow-y:visible;">' +
                '<div class="modal-dialog modal-m">' +
                '<div class="modal-content">' +
                '<div class="modal-header"><h3 style="margin:0;"></h3></div>' +

                '<div class="progress progress-striped active" style="margin-bottom:0;"><div class="progress-bar" style="width: 100%"></div></div>' +
                '</div>' +
                '</div></div></div>');


            var $dialogresult = $(
                '<div class="modal fade" data-backdrop="static" data-keyboard="false" tabindex="-1" role="dialog" aria-hidden="true" style="padding-top:15%; overflow-y:visible;">' +
                '<div class="modal-dialog modal-m">' +
                '<div class="modal-content">' +
                '<div class="modal-header"><h3 id="modalheader" style="margin:0;"></h3></div>' +
                '<div class="modal-body">' +
                '<h3 id="modalmessages" style="margin-bottom:0;"></h3>' +
                '</div>' +
                '</div></div></div>');



            return {
                /**
                 * Opens our dialog
                 * @param message Custom message
                 * @param options Custom options:
                 * 				  options.dialogSize - bootstrap postfix for dialog size, e.g. "sm", "m";
                 * 				  options.progressType - bootstrap postfix for progress bar type, e.g. "success", "warning".
                 */
                showloading: function (message, options) {
                    // Assigning defaults
                    if (typeof options === 'undefined') {
                        options = {};
                    }
                    if (typeof message === 'undefined') {
                        message = 'Loading';
                    }
                    var settings = $.extend({
                        dialogSize: 'm',
                        progressType: '',
                        onHide: null // This callback runs after the dialog was hidden
                    }, options);

                    // Configuring dialog
                    $loading.find('.modal-dialog').attr('class', 'modal-dialog').addClass('modal-' + settings.dialogSize);
                    $loading.find('.progress-bar').attr('class', 'progress-bar');
                    if (settings.progressType) {
                        $loading.find('.progress-bar').addClass('progress-bar-' + settings.progressType);
                    }
                    $loading.find('h3').text(message);
                    // Adding callbacks
                    if (typeof settings.onHide === 'function') {
                        $loading.off('hidden.bs.modal').on('hidden.bs.modal', function (e) {
                            settings.onHide.call($loading);
                        });
                    }
                    // Opening dialog
                    $loading.modal();
                },



                showresult: function (messageheader, messagebody) {

                    if (typeof messageheader === 'undefined') {
                        messageheader = 'Message';
                    }

                    if (typeof messagebody === 'undefined') {
                        messagebody = '..........';
                    }


                    $dialogresult.find('#modalheader').text(messageheader);
                    $dialogresult.find('#modalmessages').text(messagebody);
                    // Adding callbacks

                    // Opening dialog
                    $dialogresult.modal();
                },
                /**
                 * Closes dialog
                 */

                hideresult: function () {
                    $dialogresult.modal('hide');
                },


                hideloading: function () {
                    $loading.modal('hide');
                }
            };

        })(jQuery);

        function SetListBranch(el) {
            $.ajax({
                url: "/api/ReferenceData/GetAllBranch",
                success: function (data) {
                    if (data && Array.isArray(data)) {
                        data.forEach(branch => {
                            if (branch && branch.Branch_Name) {
                                // Create <option> safely
                                const option = $("<option>", {
                                    value: String(branch.Branch_Name)  // ensures proper escaping
                                }).text(branch.Branch_Name);

                                $(el).append(option);
                            }
                        });
                    }
                }
            });
        }




        function SetListDepartment(el) {
            $.ajax({
                url: "/api/ReferenceData/GetAllDepartment",
                success: function (data) {
                    if (Array.isArray(data)) {
                        for (var i = 0; i < data.length; i++) {
                            var deptName = data[i].Department_Name;

                            if (typeof deptName === "string") {
                                // Safely append using jQuery
                                $(el).append(
                                    $("<option>").val(deptName).text(deptName)
                                );
                            }
                        }
                    }
                }
            });
        }

        function CekUpload() {
            console.log("masuk fungsi CekUpload");
            $.ajax({
                method: "post",
                url: "api/Budget/CekUpload"
            }).done(function (data) {
                //alert("Is What " + data.IsIdle);
                if (DOMPurify.sanitize(data.IsIdle == 0)) {
                    $("#upload").removeAttr('disabled');
                    $("#stats").show();
                    var tanggal = moment(DOMPurify.sanitize(data.CreateOn)).format('MMMM Do YYYY, h:mm:ss').toString();
                    $("#stats").append('<ul class="list-unstyled"><li style = "color: mediumseagreen;" > Status : Last Uploaded ' + tanggal + '</li ></ul>');
                }
                else if (DOMPurify.sanitize(data.IsIdle) == 2) {
                    $("#upload").removeAttr('disabled');
                    $("#stats").show();
                    $("#stats").append('<ul class="list-unstyled"><li style = "color: mediumseagreen;" > Status : No Budgeting Data Available</li ></ul>');
                }
                else if (DOMPurify.sanitize(data.IsIdle) == 1) {
                    console.log("CekUpload: yes");
                    $("#stats").show();
                    var tanggal = DOMPurify.sanitize(moment(data.CreateOn)).format('MMMM Do YYYY, h:mm:ss').toString();
                    //$("#stats").append('<ul class="list-unstyled"><li style = "color: red;" > Status : Budgeting Data is Being Updated, Last Uploaded ' + tanggal + ', Type ' + data.Jenis + ', Budget Year ' + data.Year + '</li ></ul>');
                    $("#stats").append('<ul class="list-unstyled"><li style = "color: red;" > Status : Budgeting Data is being Updated. Please Wait! , Last Uploaded ' + tanggal + '</li ></ul>');
                }
                //else {

                //    $("#upload").removeAttr('disabled');
                //    $("#stats").show();

                //}
                //alert("master user? " + $("#isMasterUser").val());
                //alert("Pengadaan id nya" + $("#pengadaanId").val());
            });
        }
