    <script>
        const ENOTA_APPROVAL_WORKFLOW_DETAIL_SEARCH_URL = 'api/ENota/SearchApprovalWorkflowDetails';
        const ENOTA_APPROVAL_WORKFLOW_DETAIL_GET_URL = 'enota-approval-detail.html';

        var dataTable;
        showProgressBar('#interactionBlockerModal');

        $(document).ready(function () {

            new Promise(function (resolve, reject) {
                dataTable = $('.tbl-result').DataTable({
                    serverSide: true,
                    searching: false,
                    lengthChange: false,
                    drawCallback: resolve,
                    ajax: {
                        method: 'post',
                        url: ENOTA_APPROVAL_WORKFLOW_DETAIL_SEARCH_URL,
                        contentType: 'application/json',
                        data: function (data, settings) {
                            return JSON.stringify({
                                Header: {},
                                Filter: {
                                    //Subject: $('#subject').val().trim(),
                                    //DocumentNo: $('#document-no').val().trim(),
                                    //InternalRefNo: $('#internal-reff-no').val().trim(),
                                    //StatusCode: $('#document-status').val().trim(),
                                    Offset: data.start,
                                    PageLength: data.length,
                                    DrawCount: data.draw,
                                }
                            });
                        },
                        error: function (jqXHR, err, data) {
                            reject(jqXHR, err, data);
                        },
                        dataFilter: function (response) {
                            const data = JSON.parse(response);
                            console.log(data);
                            return JSON.stringify({
                                draw: data.Filter.DrawCount,
                                recordsTotal: data.Filter.TotalRecordsCount,
                                recordsFiltered: data.Filter.FilteredRecordsCount,
                                data: data.Details
                            });
                        },
                    },
                    columns: [
                        // Perihal
                        {
                            orderable: false,
                            data: function (data) {
                                return data.Subject;
                            }
                        },
                        // Dari
                        {
                            orderable: false,
                            data: function (data) {
                                return data.RequesterPersonelName;
                            }
                        },
                        // Unit Kerja
                        {
                            orderable: false,
                            data: function (data) {
                                return data.WorkUnitName;
                            }
                        },
                        // Tanggal Terima
                        {
                            orderable: false,
                            data: function (data) {
                                return formatISODate(data.RequestDate);
                            }
                        },
                        // Status
                        {
                            orderable: false,
                            data: function (data) {
                                var status = '';
                                if (data.WorkflowState && data.WorkflowState == 7) {
                                    status = 'Dibatalkan';
                                } else {
                                    if (isNullOrEmpty(data.ApprovalDecission)) {
                                        status = '<b class="text-danger">Perlu tanggapan</b>';
                                    } else if (data.ApprovalDecission == 0) {
                                        status = 'Disetujui';
                                    } else if (data.ApprovalDecission == 1) {
                                        status = 'Ditolak';
                                    } else if (data.ApprovalDecission == 2) {
                                        status = 'Disetujui dengan catatan';
                                    }
                                }
                                return status;
                            }
                        },
                        // Tindakan
                        {
                            orderable: false,
                            data: function (data) {
                                const elem = '<div class="btn-group">'
                                    + (data.IsDraft ? EditButton('Edit', 'btn-edit', 'btn-edit btn-default') : '')
                                    + ViewButton('Open', 'btn-open', 'btn-open btn-default', ENOTA_APPROVAL_WORKFLOW_DETAIL_GET_URL + '?docId=' + data.Id)
                                    + '</div>'
                                return elem;
                            }
                        },

                    ]
                });
            }).catch(function () {
                showMessage('error', 'Gagal mengambil data.', true, '.messages');
            }).finally(function () {
                hideProgressBar('#interactionBlockerModal');
            });



            $('#btn-apply-filter').on('click', function (e) {

                dataTable.draw();

            });
        });

        // Utility Function
        function isNullOrEmpty(value) {
            return value === null || // Check for null
                (typeof value === 'object' && Object.keys(value).length === 0) || // Check for an empty object
                (typeof value === 'string' && value.trim().length === 0); // Check for an empty string
        }

        // UI Utility Function
        function showMessage(msgType, msg, clear, selector) {
            let className = '';
            switch (msgType) {
                case 'success':
                    className = 'alert-success';
                    break;
                case 'info':
                    className = 'alert-info';
                    break;
                case 'warning':
                    className = 'alert-warning';
                    break;
                case 'danger':
                case 'error':
                    className = 'alert-danger';
                    break;
                default:
                    className = 'alert-success';

            }

            let msgEl = $('<li><div class="alert alert-dismissible ' + className + '">'
                + '<button type="button" class="close" data-dismiss="alert" aria-label="Close"><span aria-hidden="true">&times;</span></button>'
                + msg
                + '</div></li>');

            if (clear) {
                $(selector).empty();
            }
            $(selector).append(msgEl);

        }

        // UI Utility Function
        function showProgressBar(selector) {
            $(selector).modal({
                backdrop: 'static', // Prevent closing on outside click
                keyboard: false // Prevent closing with keyboard
            });
        }

        // UI Utility Function
        function hideProgressBar(selector) {
            $(selector).modal('hide');
        }

        // UI Component
        function EditButton(label, id, classNames, actionUrl) {
            return '<button id="' + id + '"type="button" class="btn "' + classNames + '><i class="fa fa-fw fa-edit"></i>' + (label ? label : 'Edit') + '</button>';
        }

        // UI Component
        function ViewButton(label, id, classNames, actionUrl) {
            return '<a id="' + id + '"type="button" class="btn "' + classNames + ' href="' + actionUrl + '"><i class="fa fa-fw fa-file"></i>' + (label ? label : 'View') + '</a>';
        }

        function formatISODate(inputISODate) {
            if (!inputISODate) return '';

            const date = new Date(inputISODate);
            const currentDate = new Date();

            // Get date components
            const year = date.getFullYear().toString().slice(-4); // Get last two digits of the year
            const monthNameShort = date.toLocaleString('default', { month: 'short' }); // Get local month name
            const month = ('0' + (date.getMonth() + 1)).slice(-2); // Get two-digit month
            //const day = ('0' + date.getDate()).slice(-2); // Get two-digit day
            const day = ('0' + date.getDate()).slice(-2); // Get two-digit day
            const hour = ('0' + date.getHours()).slice(-2); // Get two-digit hours
            const minute = ('0' + date.getMinutes()).slice(-2); // Get two-digit minutes


            // Format as 'YY-MM-DD'
            //const formattedDate = `${day}-${monthNameShort}-${year} ${hour}:${minute}`;
            const formattedDate = `${day ? ` ${day} ${monthNameShort}` : ''}${year ? ` ${year}` : ''} ${hour}:${minute}`;

            return formattedDate;
        }

    </script>
