    <script>

        $(document).ready(function () {
            initCsrf();
        });

        var eMemoContentEditor = null

        $.ajax({
            url: "/kebijakan-pendaftaran.html",
            method: 'GET',
            success: function (data) {
                $('#eMemo-editor').html(DOMPurify.sanitize(data))
                eMemoContentEditor = new Quill('#eMemo-editor', {
                    theme: 'snow'
                });
            }
        });

        function submitEdit() {

            if (!csrfToken) {
                alert("CSRF token belum siap, refresh halaman");
                return;
            }

            var editor = eMemoContentEditor.getSemanticHTML()
            console.log(editor)

            var headers = {};
            if (csrfToken) {
                headers['X-CSRF-Token'] = csrfToken;
                headers['X-XSRF-TOKEN'] = csrfToken;
            }


            $.ajax({
                url: 'api/ReferenceData/UpdatePolicyPendaftaran',
                method: 'POST',
                data: JSON.stringify(editor),
                dataType: "json",
                contentType: 'application/json; charset=utf-8',
                headers: headers,
                success: function (data) {
                    alert('Berhasil Di Edit');
                }
            });
        }

    </script>
