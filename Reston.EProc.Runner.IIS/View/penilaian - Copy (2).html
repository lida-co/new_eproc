        $(function () {
            table_list = $('#table-rubah-pic').DataTable({
                "ajax": {
                    "url": 'api/NilaiVendor/ListPemenangPengadaanNilaiVendor',
                    "type": 'POST',
                    "data": function (d) {

                        d.status = "";
                    },
                    "error": function (jqXHR, textStatus, errorThrown) {
                    }
                },
                "columns": [
                    { "data": "JudulPengadaan" },
                    { "data": "NoPengadaan" },
                    { "data": "NamaVendor" },
                    { "data": "PIC" },
                    { "data": "null" },
                ],
                "columnDefs": [
                    {
                        "render": function (data, type, row) {

                            return '<a href="pengadaan-detail.html#' + row.Id + '" target="_blank" id="" ">' + data + '</a>';
                        },
                        "targets": 0,
                        //"orderable": false
                    },
                    {
                        "render": function (data, type, row) {
                            //return '<a class="btn btn-sm btn-warning" id="" onclick="create(\'' + row.Id + '\')">Buat</a>';
                            if (row.CekCreate == "belum") {
                                return '<a href="penilaian-add.html?Id=' + row.NoPengadaan + '" target="_blank" id="" class="btn btn-sm btn-primary "> Buat </a>';
                            } else if (row.CekCreate == "sudah") {
                                return '<a href="penilaian-detail.html?Id=' + row.NoPengadaan + '" target="_blank" id="" class="btn btn-sm btn-warning "> Lihat </a>';
                            }
                        },
                        "targets": 4,
                        //"orderable": false
                    },
                ],
                "serverSide": true,
                "paging": true,
                "lengthChange": false,
                "searching": false,
                "ordering": true,
                "info": true,
                "autoWidth": false,
                "responsive": true,
                "destroy": true
            });
        });

            table_list.draw();
