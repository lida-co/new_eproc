            const ENOTA_EDIT_URL = 'enota-edit.html';
            const ENOTA_DETAIL_GET_URL = 'api/ENota/Get';
            const ENOTA_APPROVAL_WORKFLOW_DETAIL_GET_URL = 'api/ENota/GetApprovalWorkflowDetail';
            const ENOTA_APPROVAL_WORKFLOW_DETAIL_SEARCH_URL = 'api/ENota/SearchApprovalWorkflowDetails';

            var eNotaContentEditor;

            $(document).ready(function () {

                eNotaContentEditor = new Quill('#eNota-editor', {
                    theme: 'snow',
                    readOnly: true,
                    modules: {
                        toolbar: false
                    }
                });

                showProgressBar('#interactionBlockerModal');

                new Promise((resolve, reject) => {
                    // Fetch ENota detail
                    var q = parseQueryString();
                    if (!q.docId) return reject('Document Id is required');
                    $.ajax({
                        url: ENOTA_DETAIL_GET_URL + '?docId=' + q.docId,
                        method: 'GET',
                        success: resolve,
                        error: reject
                    });
                }).then((data) => {
                    // Populate view using ENota detail
                    if (!data.Detail) return Promise.reject(new Error("Unexpected data format"));
                    populateView(document, data.Detail);
                    return Promise.resolve(data);
                }).then((data) => {
                    // Attach listeners here

                    // #btn-page-action-edit
                    $('#btn-page-action-edit').on('click', (e) => {
                        const docId = data.Detail.Id;
                        window.location.href = ENOTA_EDIT_URL + '?docId=' + docId;
                    });

                    // .file-chooser
                    $('.file-chooser').on('click', '.file-upload-item', (e) => {
                        e.preventDefault();
                        let fileChooserElem = $(this);
                        let contentTitle = fileChooserElem.find('.fileupload-item-title').data('item-title');
                        let contentType = fileChooserElem.find('.fileupload-item-content-type').html();
                        let contentData = fileChooserElem.find('.fileupload-item-data-b64').html();

                        downloadDocument(contentTitle, contentType, contentData);
                        return false;

                    });

                }).catch((err) => {
                    console.error(err)
                    showMessage('error', 'Gagal memuat dokumen.', true, '.messages', err);
                }).finally(() => {
                    hideProgressBar('#interactionBlockerModal');
                });

            });


            function createViewModel() {
                let vm = {
                    Id: null,
                    DocumentNo: '',
                    DecissionNote: '',
                };

                return vm;

            }

            function populateViewModel(parent, viewModel) {
                const root = parent == null ? $(document) : $(parent);
                const vm = viewModel == null ? createViewModel() : viewModel;

                vm.Id = root.find('input[name="ENotaId"]').val();
                vm.DocumentNo = root.find('input[name="DocumentNo"]').val();
                vm.DecissionNote = root.find('input[name="ApprovalDecissionNote"]').val();

                return vm;
            }

            function populateView(parent, viewModel) {

                const root = parent == null ? $(document) : $(parent);

                root.find('input[name="ENotaId"]').val(viewModel.Id);
                root.find('#DocumentNo').html(viewModel.DocumentNo);
                root.find('#WorkUnitName').html(viewModel.WorkUnitName);
                root.find('#InternalRefNo').html(viewModel.InternalRefNo);
                root.find('#Subject').html(viewModel.Subject);
                root.find('#Kepada').html(viewModel.Kepada);
                root.find('#Tembusan').html(viewModel.Tembusan);
                root.find('#HPSAmount').html(viewModel.HPSAmount);

                if (viewModel.ContentType === 'text/html') {
                    if (eNotaContentEditor) {
                        //eNotaContentEditor.setText(atob(viewModel.ContentData));
                        eNotaContentEditor.root.innerHTML = atob(viewModel.ContentData);
                    }
                    root.find('.btn-maindoc-filechooser').removeClass('active');
                    root.find('.enota-maindoc-filechooser').hide();
                    root.find('.btn-maindoc-editor').addClass('active');
                    root.find('.enota-maindoc-editor').show();
                } else {
                    root.find('.file-chooser-enota-maindoc .file-chooser-file-list').empty();
                    root.find('.file-chooser-enota-maindoc .file-chooser-file-list')
                        .append(FileChooserFileItem(
                            viewModel.ContentTitle,

                            viewModel.ContentType,
                            viewModel.ContentData,
                            true

                    root.find('.btn-maindoc-editor').removeClass('active');
                    root.find('.enota-maindoc-editor').hide();
                    root.find('.btn-maindoc-filechooser').addClass('active');
                    root.find('.enota-maindoc-filechooser').show();

                    // enumerate reviewers
                    validators.forEach((item) => {

                        let wfDetail = wfDetails ? wfDetails.find((wfdtl) =>

                            && wfdtl.ApproverRole == item.ParticipantRole) : null;

                        let personelId = item.PersonelUserId;
                        let personelName = item.PersonelFullName;
                        let wfDetailId = wfDetail ? wfDetail.Id : '';

                        let personelApprovalDecission = wfDetail && wfDetail.ApprovalDecission ? wfDetail.ApprovalDecission : '';

                        let participantId = item.Id;
                        let personelId = item.PersonelUserId;
                        let personelName = item.PersonelFullName;
                        let wfDetailId = wfDetail ? wfDetail.Id : '';
                        let personelPosition = wfDetail && wfDetail.ApproverPersonelPosition ? wfDetail.ApproverPersonelPosition : '';
                        let personelApprovalDecission = wfDetail && wfDetail.ApprovalDecission ? wfDetail.ApprovalDecission : '';
                        let personelApprovalDecissionDate = wfDetail && wfDetail.ApprovalDecissionDate ? wfDetail.ApprovalDecissionDate : '';
                        let personelApprovalNotes = wfDetail && wfDetail.ApprovalNotes ? wfDetail.ApprovalNotes : '';

                            ApprovalPanel(

                    });

                $('.approvals-tab-content-container').append($('<hr/>'));

                        $('.approvals-tab-content-container').append(

                // If this ENota not editable, hide the edit button

            function isValidationResultEmpty(valResultObj) {
                // Check if valResult is null or undefined
                if (valResultObj === null || valResultObj === undefined) {
                    return true;
                }

                // Check if valResult has no properties
                if (Object.keys(valResultObj).length === 0) {
                    return true;
                }

                // Check if all properties' arrays are empty
                for (const property in valResultObj) {
                    if (valResultObj.hasOwnProperty(property) && Array.isArray(valResultObj[property]) && valResultObj[property].length > 0) {
                        return false; // At least one non-empty array found
                    }
                }

                // If all properties' arrays are empty or undefined, valResult is considered empty
                return true;
            }

            function highlighError(selector, msg) {
                let elem = $(selector);
                let formGroupElem = elem.closest('.form-group');
                let message = '';
                if (Array.isArray(msg)) {
                    message = msg.reduce((accumulator, currentValue) => {
                        return accumulator + (', ' + currentValue);
                    }, '');
                } else {
                    message = msg;
                }
                // remove leading comma
                if (message.startsWith(', ')) message = message.slice(2);

                let helpBlockElem = $('<span class="help-block">' + message + '</span>');
                formGroupElem.find('.help-block').remove(); // remove any help-block element before adding
                formGroupElem.append(helpBlockElem); // then add
                formGroupElem.addClass('has-error'); // then highlight
            }

            // Utility Function
            function isNullOrEmpty(value) {
                return value === null || // Check for null
                    (typeof value === 'object' && Object.keys(value).length === 0) || // Check for an empty object
                    (typeof value === 'string' && value.trim().length === 0); // Check for an empty string
            }

            // Utility function
            function parseQueryString() {
                var queryString = window.location.search.slice(1);
                var params = {};
                queryString.split("&").forEach(function (pair) {
                    var parts = pair.split("=");
                    var key = decodeURIComponent(parts[0]);
                    var value = decodeURIComponent(parts[1] || "");

                    params[key] = value;
                });
                return params;
            }

            // UI Utility Function
            function showMessage(msgType, msg, clear, selector, hiddenMsg) {
                let className = '';
                switch (msgType) {
                    case 'success':
                        className = 'alert-success';
                        break;
                    case 'info':
                        className = 'alert-info';
                        break;
                    case 'warning':
                        className = 'alert-warning';
                        break;
                    case 'danger':
                    case 'error':
                        className = 'alert-danger';
                        break;
                    default:
                        className = 'alert-success';

                }

                let msgEl = $('<li><div class="alert alert-dismissible ' + className + '">'
                    + (hiddenMsg ? '<span class="hidden">' + hiddenMsg + '</span>' : '')
                    + '<button type="button" class="close" data-dismiss="alert" aria-label="Close"><span aria-hidden="true">&times;</span></button>'
                    + msg
                    + '</div></li>');

                if (clear) {
                    $(selector).empty();
                }
                $(selector).append(msgEl);

            }

            // UI Utility Function
            function showProgressBar(selector) {
                $(selector).modal({
                    backdrop: 'static', // Prevent closing on outside click
                    keyboard: false // Prevent closing with keyboard

            function hideProgressBar(selector) {

                const fileSizeElem = $('<div class="fileupload-item-size hidden">' + fileSize + '</div>');
                const fileContentTypeElem = $('<div class="fileupload-item-content-type hidden">' + fileContentType + '</div>');
                const fileDataB64Elem = $('<div class="fileupload-item-data-b64 hidden">' + fileDataB64 + '</div>');

                fileItemElem.append(fileNameElem);
                fileItemElem.append(fileSizeElem);
                fileItemElem.append(fileContentTypeElem);
                fileItemElem.append(fileDataB64Elem);

            }

            function ApprovalPanel(approvalRequestId, personelName, personelPosition, approvalDecission, approvalDecissionDate, approvalNotes, readOnly) {
                let comp = '<div data-approval-request-id="' + approvalRequestId + '" class="approval-box panel panel-info">'

                    comp += '<div class="col-md-2"><label>Jawaban</label><div>' + approvalDecission + '</div></div>';
                    comp += '<div class="col-md-2"><label>Tanggal jawab</label><div>' + formatISODate(approvalDecissionDate) + '</div></div>';
                    comp += '</div>'

                    comp += '<div class="col-md-6">'

                        + '</div>';
                    comp += '</div>'
                } else {
                    comp += '<div class="row approval-box-row">'
                    comp += '<div class="form-group col-md-6 validatable">'
                        + '<label for="ApprovalDecissionNote">Disposisi</label>'
                        + '<input type="text" name="ApprovalDecissionNote" class="form-control input-approval-decission-note" maxlength="200">'
                        + '</div>';
                    comp += '</div>'
                    comp += '<div class="row approval-box-row">'
                    comp += '<div class="col-md-6">'
                        + '<label for="">Approval</label>'

                        + '<button type="button" class="btn btn-default btn-approval-decission btn-approval-decission-approve-notes">Lanjutkan dengan catatan</button>'
                        + '<button type="button" class="btn btn-danger btn-approval-decission btn-approval-decission-reject">Tolak</button>'
                        + '</div>'
                        + '</div>';
                    comp += '</div>'
                }
                comp += '</div>';
                comp += '</div>';

                return $(comp);
            }

            function formatISODate(inputISODate) {
                if (!inputISODate) return '';

                const date = new Date(inputISODate);
                const currentDate = new Date();

                // Get date components
                const year = date.getFullYear() === currentDate.getFullYear()
                    ? ''  // Don't include year if it's the current year
                    : date.getFullYear().toString().slice(-4); // Get last two digits of the year
                const monthNameShort = date.toLocaleString('default', { month: 'short' }); // Get local month name
                const month = ('0' + (date.getMonth() + 1)).slice(-2); // Get two-digit month
                //const day = ('0' + date.getDate()).slice(-2); // Get two-digit day
                const day = date.getDate() === currentDate.getDate() && date.getMonth() === currentDate.getMonth()
                    ? ''  // Don't include day if it's today
                    : ('0' + date.getDate()).slice(-2); // Get two-digit day
                const hour = ('0' + date.getHours()).slice(-2); // Get two-digit hours
                const minute = ('0' + date.getMinutes()).slice(-2); // Get two-digit minutes


                // Format as 'YY-MM-DD'
                //const formattedDate = `${day}-${monthNameShort}-${year} ${hour}:${minute}`;
                const formattedDate = `${day ? ` ${day}-${monthNameShort}` : ''}${year ? ` ${year}` : ''} ${hour}:${minute}`;

                return formattedDate;
            }

            // Utility function
            function downloadDocument(contentTitle, contentType, contentDataBase64) {
                var binaryData = atob(contentDataBase64);
                var arrayBuffer = new ArrayBuffer(binaryData.length);
                var uint8Array = new Uint8Array(arrayBuffer);
                for (var i = 0; i < binaryData.length; i++) {
                    uint8Array[i] = binaryData.charCodeAt(i);
                }
                var blob = new Blob([arrayBuffer], { type: contentType });
                var a = document.createElement("a");
                a.href = window.URL.createObjectURL(blob);
                a.download = contentTitle;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            }

        </script>
