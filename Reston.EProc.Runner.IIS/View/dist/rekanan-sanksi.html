    <script>
        cekLogin(0)

        $(function () {
            table_list = $('#table-rubah-pic').DataTable({
                "ajax": {
                    "url": 'api/NilaiVendor/ListVendorWithSanksi',
                    "type": 'POST',
                    "data": function (d) {
                        d.search = $("#txtcari").val();
                        d.status = $("#klasifikasi").val();
                    },
                    "error": function (jqXHR, textStatus, errorThrown) {
                    }
                },
                "columns": [
                    { "data": "NamaVendor" },
                    { "data": "NomorVendor" },
                    { "data": "DecisionTypeCode" },
                    { "data": "DecisionDescription" },
                    { "data": "null" },
                ],
                "columnDefs": [
                    {
                        "render": function (data, type, row) {
                            if (row.DecisionTypeCode == "SV01") {
                                return '<span class="label label-success" style="font-size:small;">No Warning</span>';
                            }
                            else if (row.DecisionTypeCode == "SV02") {
                                return '<span class="label label-warning" style="font-size:small;">Warning</span>';
                            }
                            else if (row.DecisionTypeCode == "SV04") {
                                return '<span class="label label-danger" style="font-size:small;">Penalty</span>';
                            }
                            else if (row.DecisionTypeCode == "SV03") {
                                return '<span class="label label-default" style="font-size:small;">Blacklist</span>';
                            }
                        },
                        "targets": 2,
                        //"orderable": false
                    },
                    {
                        "render": function (data, type, row) {
                            if (row.DecisionDescription == "") {
                                return 'Tidak ada Komentar';
                            } else return row.DecisionDescription;
                        },
                        "targets": 3,
                        //"orderable": false
                    },
                    {
                        "render": function (data, type, row) {
                            //return '<a class="btn btn-sm btn-warning" id="" onclick="create(\'' + row.Id + '\')">Buat</a>';
                            if (row.DecisionTypeCode == "SV02" || row.DecisionTypeCode == "SV03") {
                                return '<span class="label label-default" style="font-size:small;">Sedang Dalam Masa Sanksi</span>';
                            } else {
                                return '<a href="rekanan-sanksi-add.html?Id=' + row.VendorId + '" target="_blank" id="" class="btn btn-sm btn-warning "> Berikan Sanksi </a>';
                            }
                        },
                        "targets": 4,
                        //"orderable": false
                    },
                ],
                "serverSide": true,
                "paging": true,
                "lengthChange": false,
                "searching": false,
                "ordering": true,
                "info": true,
                "autoWidth": false,
                "responsive": true,
                "destroy": true
            });
        });

        function fungsicari() {
            table_list.draw();
        }

    </script>
