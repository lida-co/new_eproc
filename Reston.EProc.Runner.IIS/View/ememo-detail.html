    <style type="text/css">
        .nav {
            padding-left: 0;
            margin-bottom: 0;
            list-style: none
        }

            .nav > li {
                position: relative;
                display: block
            }

                .nav > li > a {
                    position: relative;
                    display: block;
                    padding: 10px 15px
                }

                    .nav > li > a:focus,
                    .nav > li > a:hover {
                        text-decoration: none;
                        background-color: #eee
                    }

                .nav > li.disabled > a {
                    color: #777
                }

                    .nav > li.disabled > a:focus,
                    .nav > li.disabled > a:hover {
                        color: #777;
                        text-decoration: none;
                        cursor: not-allowed;
                        background-color: transparent
                    }

            .nav .open > a,
            .nav .open > a:focus,
            .nav .open > a:hover {
                background-color: #eee;
                border-color: #337ab7
            }

            .nav .nav-divider {
                height: 1px;
                margin: 9px 0;
                overflow: hidden;
                background-color: #e5e5e5
            }

            .nav > li > a > img {
                max-width: none
            }

        .nav-tabs {
            border-bottom: 1px solid #ddd
        }

            .nav-tabs > li {
                float: left;
                margin-bottom: -1px
            }

                .nav-tabs > li > a {
                    margin-right: 2px;
                    line-height: 1.42857143;
                    border: 1px solid transparent;
                    border-radius: 4px 4px 0 0
                }

                    .nav-tabs > li > a:hover {
                        border-color: #eee #eee #ddd
                    }

                .nav-tabs > li.active > a,
                .nav-tabs > li.active > a:focus,
                .nav-tabs > li.active > a:hover {
                    color: #555;
                    cursor: default;
                    background-color: #fff;
                    border: 1px solid #ddd;
                    border-bottom-color: transparent
                }

            .nav-tabs.nav-justified {
                width: 100%;
                border-bottom: 0
            }

                .nav-tabs.nav-justified > li {
                    float: none
                }

                    .nav-tabs.nav-justified > li > a {
                        margin-bottom: 5px;
                        text-align: center
                    }

                .nav-tabs.nav-justified > .dropdown .dropdown-menu {
                    top: auto;
                    left: auto
                }
    </style>

                    <div class="box-body">
                        <form id="ememo-create-form" role="form">
                            <input name="EMemoId" id="EMemoId" type="hidden">

                                </div>
                            </div>
                            <div class="row">
                                <div class="form-group col-md-6">

                            </div>

                                <div class="form-group col-md-6">
                                    <label class="control-label">Kepada</label>

                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="form-group col-md-6">
                                    <label class="control-label">Tembusan</label>
                                    <div class="input-list-wrapper" style="display: flex;align-items:flex-start;">
                                        <div class="input-list chip-list" id="input-list-tembusan" style="display: flex; flex-wrap: wrap;" data-max-item="10">
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="form-group col-md-6">
                                    <label class="control-label">HPSAmount</label>
                                    <div class="input-list-wrapper" style="display: flex;align-items:flex-start;">
                                        <div class="input-list chip-list" id="input-list-HPSAmount" style="display: flex; flex-wrap: wrap;" data-max-item="10">
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="row">

                                    <div id="eMemo-editor"></div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="form-group col-md-6">
                                    <label class="control-label title">Penawaran</label>
                                    <div class="file-chooser file-chooser-penawaran" data-max-items="5" data-max-size="2000000" data-readonly="true">
                                        <div class="file-chooser-file-list"></div>
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="form-group col-md-6">
