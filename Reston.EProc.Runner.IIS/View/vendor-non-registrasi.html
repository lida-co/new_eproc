          function getParameterByName(name, url) {
              if (!url) url = HOME_PAGE;
              name = name.replace(/[\[\]]/g, "\\$&");
              var regex = new RegExp("[?&]" + name + "(=([^&#]*)|&|#|$)"),
                  results = regex.exec(url);
              if (!results) return null;
              if (!results[2]) return '';
              return decodeURIComponent(results[2].replace(/\+/g, " "));
          }

          $(function () {
              console.log(DOMPurify.sanitize(id));
              SetListProvinsi();

//<<<<<<<.mine

//=======

          function cekmasteruser() {
              console.log("masuk fungsi cekmasteruser");
              $.ajax({
                  method: "post",
                  url: "api/pengadaane/cekmasteruser?PengadaanId=" + $("#pengadaanId").val()
              }).done(function (data) {
					//data = DOMPurify.sanitize(data);

                  $("#isMasterUser").val(1);

                  $("#navMasterUser").show();
                  //alert("master user? " + $("#isMasterUser").val());
              });
          }

          function loadDetail(id) {
              cekmasteruser();
              $("#submit-form-add-vendor").remove(); 
              $.ajax({
                  url: "Api/Vendor/GetVendorDetail?id=" + DOMPurify.sanitize(id)
              }).done(function (data) {
                  console.log(data);
			  //data = DOMPurify.sanitize(data);
                  $("[name=Nama]").val(DOMPurify.sanitize(data.Nama));
                  $("[name=Alamat]").val(DOMPurify.sanitize(data.Alamat));
                  $("[name=Kota]").val(DOMPurify.sanitize(data.Kota));
                  $("[name=KodePos]").val(DOMPurify.sanitize(data.KodePos));
                  $("[name=Email]").val(DOMPurify.sanitize(data.Email));
                  $("[name=Telepon]").val(DOMPurify.sanitize(data.Telepon));
                  $("[name=Website]").val(DOMPurify.sanitize(data.Website));
                  $("#listProvinsi").val(DOMPurify.sanitize(data.Provinsi)).prop('checked', true);
                  if ($("#isMasterUser").val() == 1) {
                      $("[name=Nama]").attr("disabled", false);
                      $("[name=Alamat]").attr("disabled", false);
                      $("[name=Kota]").attr("disabled", false);
                      $("[name=KodePos]").attr("disabled", false);
                      $("[name=Email]").attr("disabled", false);
                      $("[name=Telepon]").attr("disabled", false);
                      $("[name=Website]").attr("disabled", false);
                      $("#listProvinsi").attr("disabled", false);
                      $("#submit-form-edit-vendor").show(); 
                  } 
                  else {
                      $("[name=Nama]").attr("disabled", true);
                      $("[name=Alamat]").attr("disabled", true);
                      $("[name=Kota]").attr("disabled", true);
                      $("[name=KodePos]").attr("disabled", true);
                      $("[name=Email]").attr("disabled", true);
                      $("[name=Telepon]").attr("disabled", true);
                      $("[name=Website]").attr("disabled", true);
                      $("#listProvinsi").attr("disabled", true);
                  }
              });

          }



          function SetListProvinsi() {
              $.ajax({
                  url: "/api/ReferenceData/GetAllProvinsi",
                  success: function (data) {
				  //data = DOMPurify.sanitize(data);
				  if(data){
                      for (var i in data) {
                          $("#listProvinsi").append("<option value='" + DOMPurify.sanitize(data[i].Name) + "'>" + DOMPurify.sanitize(data[i].Name) + "</option>");
                      }
                  }
                  }
              });
          }

          function SetListBank() {
              $.ajax({
                  url: "/api/ReferenceData/GetAllBank",
                  success: function (data) {
				  //data = DOMPurify.sanitize(data);
				  if(data){
                      for (var i in data) {
                          $("[name='BankInfo.Nama']").append("<option value='" + DOMPurify.sanitize(data[i].Name) + "'>" + DOMPurify.sanitize(data[i].Name) + "</option>");
                      }
                  }
                  }
              });
          }

          var frm = $('#formVendor');

          frm.submit(function (ev) {
              ev.preventDefault(); // pindahin ke atas

              var v = validateForm();
              if (!v) return;

              if (!csrfToken) {
                  alert("CSRF token belum siap, refresh halaman");
                  return;
              }

              var headers = {};
              if (csrfToken) {
                  headers['X-CSRF-Token'] = csrfToken;
                  headers['X-XSRF-TOKEN'] = csrfToken;
              }

              console.log("sending");

              $.ajax({
                  type: frm.attr('method'),
                  url: frm.attr('action'),
                  data: frm.serialize(),
                  headers: headers,
                  beforeSend: function () {
                      $("#submit-form-add-vendor").prop('disabled', true);
                      $("#submit-form-edit-vendor").prop('disabled', true);
                  },
                  success: function (data) {
                      console.log("response:", data);

                      $("#submit-form-add-vendor").prop('disabled', false);
                      $("#submit-form-edit-vendor").prop('disabled', false);

                      window.location.href = "rekanan.html";
                  },
                  error: function (xhr) {
                      $("#submit-form-add-vendor").prop('disabled', false);
                      $("#submit-form-edit-vendor").prop('disabled', false);

                      alert("Gagal menyimpan vendor");
                      console.error(xhr.responseText);
                  }
              });
          });

          function validateForm() {
              //$("#alert-validation-error").show();
              //$('.form-validation-error').removeClass('form-validation-error');
              var v = true;

              if ($("[name='Nama']").val() == '') {
                  $("[name='Nama']").addClass('form-validation-error');
                  $("#alert-validation-error").show();
                  v = false;
              }
              if ($("[name='Alamat']").val() == '') {
                  $("[name='Alamat']").addClass('form-validation-error');
                  $("#alert-validation-error").show();
                  v = false;
              }
              if ($("[name='Provinsi']").val() == '') {
                  $("[name='Provinsi']").addClass('form-validation-error');
                  $("#alert-validation-error").show();
                  v = false;
              }
              if ($("[name='Kota']").val() == '') {
                  $("[name='Kota']").addClass('form-validation-error');
                  $("#alert-validation-error").show();
                  v = false;
              }
              if ($("[name='KodePos']").val() == '') {
                  $("[name='KodePos']").addClass('form-validation-error');
                  $("#alert-validation-error").show();
                  v = false;
              }
              if ($("[name='Telepon']").val() == '') {
                  $("[name='Telepon']").addClass('form-validation-error');
                  $("#alert-validation-error").show();
                  v = false;
              }
              if ($("[name='Email']").val() == '') {
                  $("[name='Email']").addClass('form-validation-error');
                  $("#alert-validation-error").show();
                  v = false;
              }
              if (!v) $("form .form-validation-error").first().focus();
              return v;
          }
