        $.extend({
            getUrlVars: function () {
                var vars = [], hash;
                var hashes = window.location.href.slice(window.location.href.indexOf('?') + 1).split('&');
                for (var i = 0; i < hashes.length; i++) {
                    hash = hashes[i].split('=');
                    vars.push(hash[0]);
                    vars[hash[0]] = hash[1];
                }
                return vars;
            },
            getUrlVar: function (name) {
                return $.getUrlVars()[name];
            }
        });

        function show(aval) {
            if (aval == "true") {
                raterange.style.display = 'inline';
                ratevalue.style.display = 'none';
                //Form.fileURL.focus();
            }
            else {
                raterange.style.display = 'none';
                ratevalue.style.display = 'inline';

            //alert("qwerty");

            $("#title_1").show();

            $("#btn_1").show();

        function Delete(idd) {
            $("#DeleteModal").modal('hide');
            var v = 0;
            if (!idd) {
                v = $("#tobeDelete").val();
            }
            else v = idd
            $.ajax({
                url: "/api/MonitoringSelection/deleteEach?Id=" + v,
                success: function (data) {
				//data = DOMPurify.sanitize(data);
                    table.ajax.reload();
                    alert(data.message);
                }
            });
        }

        $("#example1").on("click", ".remove-item", function () {

        var table = $('#example1').DataTable({
            "serverSide": true,
            "searching": false,
            "ajax": {
                "url": '/Api/MonitoringSelection/GetListTambah?documentId=' + $.getUrlVar("documentId"), //6298c3a9-cf12-477a-bc00-f311703b9477', //?documentId=" + $.getUrlVar("documentId")

                { "data": "RegionCode" },
                { "data": "RateLowerLimit" },
                { "data": "RateUpperLimit" },
                { "data": null },
                { "data": "Rate" },
                { "data": "IsRange" },

            "columnDefs": [
                
                {
                    "render": function (data, type, row) {
                        var html = '<a style="margin-left: 5px;" idDelete="' + row.Id + '" class="btn btn-danger remove-item btn-sm product-title"><span class="fa fa-trash-o"></span> Hapus</a>';
                        html = html + '<a style="margin-left: 5px;" idEdit="' + row.Id + '" class="btn btn-primary edit-item btn-sm product-title"><span class="fa fa-pencil-square-o"></span> Edit</a>';
                        return html;
                    },

                    "targets": 5,
                    "orderable": false
                },
                {
                    targets: [6],
                    "orderable": false,
                    "visible": false,
                    "searchable": false
                },
                {
                    targets: [7],
                    "orderable": false,
                    "visible": false,
                    "searchable": false
                }
                ,
                {
                    targets: [8],
                    "orderable": false,
                    "visible": false,
                    "searchable": false
                }
            ],
            "createdRow": function (row, data, dataIndex) {
                //alert(data);
                //alert(data.IsRange);
                if (data.IsRange === false) {
                    // Add COLSPAN attribute
                    $('td:eq(3)', row).attr('colspan', 2);

                    // Center horizontally
                    $('td:eq(3)', row).attr('align', 'center');

                    // Hide required number of columns
                    // next to the cell with COLSPAN attribute
                    $('td:eq(4)', row).css('display', 'none');
                    //$('td:eq(3)', row).css('display', 'none');

                    // Update cell data
                    this.api().cell($('td:eq(3)', row)).data(data.Rate);
                }
                //alert(data.IsOpen);
                if (data.IsOpen === true) {
                    // Add COLSPAN attribute
                    $('td:eq(3)', row).attr('colspan', 2);

                    // Center horizontally
                    $('td:eq(3)', row).attr('align', 'center');

                    // Hide required number of columns
                    // next to the cell with COLSPAN attribute
                    $('td:eq(4)', row).css('display', 'none');
                    //$('td:eq(3)', row).css('display', 'none');

                    // Update cell data
                    this.api().cell($('td:eq(3)', row)).data('Perlu Underwriting');
                }

        $("#SelaluSimpan").on("click", function () {
            var InsTarTem = {};

            InsTarTem.BenefitType = $("#BenefitType").val();

            save(InsTarTem);

        function save(InsTarTem) {
            $.ajax({
                url: "Api/Rks/SelaluSimpan?documentId=" + $.getUrlVar("documentId"),
                method: "POST",
                data: InsTarTem
            }).done(function (data) {
                var msg = data.message;

            });

                    BenefitCode: $("#BenefitCode").val(),

        function EditConfirmation(ide) {
            $("#tobeEdit").val(ide);
           // Alert(datanya = $("#tobeEdit").val());
            $("#exampleModal").modal('show');
            $("#title_1").hide();
            $("#title_2").show();
            $("#btn_1").hide();
            $("#btn_2").show();
            editbenefit(ide);
        }

        function clear() {
            //alert("ngapus kudunya");
            document.getElementById("BenefitCode").value = "";
            document.getElementById("RegionCode").value = "";
            document.getElementById("BenefitCoverage").value = "";
            document.getElementById("RateLowerLimit").value = "";
            document.getElementById("RateUpperLimit").value = "";
            document.getElementById("Rate").value = "";
            document.getElementById("IsOpen").value = "";
            document.getElementById("changeShipInputs").value = "";
            $('#IsOpen').val();
        }

        
        function editbenefit(ide) {
            var v = 0;
            if (!ide) {
                v = $("#tobeEdit").val();
            }
            else v = ide
            {
                $.getJSON("/api/Asuransi/GetEdit?Id=" + v, null, function (data) {
				//data = DOMPurify.sanitize(data);
                    clear();
                    console.log("doc data:", data);
                    $('#BenefitCode').val(data.BenefitCode);
                    $('#RegionCode').val(data.RegionCode);
                    $('#BenefitCoverage').val(data.BenefitCoverage);
                    $('#RateLowerLimit').val(data.RateLowerLimit);
                    $('#RateUpperLimit').val(data.RateUpperLimit);
                    $('#Rate').val(data.Rate);
                    $('#IsRange').val(String(data.IsRange));
                    show(String(data.IsRange));
                    $('#IsOpen').val(data.IsOpen);
                    if (data.IsOpen == 1) {
                        document.getElementById("IsOpen").checked = true;
                        //$('.IsOpen').prop('checked', true);
                        $(".IsOpen").click();
                        $("#changeShipInputs").hide();
                    }
                    else {
                        document.getElementById("IsOpen").checked = false;
                        //$('.IsOpen').prop('checked', false);
                        $("#changeShipInputs").show();
                    }
                });
            }
        }


        $("#Simpanedit").on("click", function () {
            var a = document.forms["addBenefitForm"]["BenefitCode"].value;
            var b = document.forms["addBenefitForm"]["RegionCode"].value;
            var c = document.forms["addBenefitForm"]["BenefitCoverage"].value;
            var x = document.forms["addBenefitForm"]["Rate"].value;
            var y = document.forms["addBenefitForm"]["RateLowerLimit"].value;
            var z = document.forms["addBenefitForm"]["RateUpperLimit"].value;
            //var regex = /^(\d*\.)?\d+$/;
            //var regex = /^([0-9]\.)?[0-9]$/;
            var regex = /^[0-9](\.[0-9]+)?$/;

            if (a == "" || b == "" || c == "") {
                alert("Silahkan Lengkapi Data");
                return false;
            }
            else if (x == "" && y == "" && z == "") {
                ForSaveEdit()
            }
            else if (x == "" && y.match(regex) && z.match(regex)) {
                ForSaveEdit()
            }
            else if (y == "" && z == "" && x.match(regex)) {
                ForSaveEdit()
            }
            else {
                    alert("Silahkan Masukkan Angka");
                    return false;
            }
            
        });

        function ForSaveEdit() {
            //alert(datanya = $("#tobeEdit").val());
            var arrData = {

                Rate: $("#Rate").val(),
                RateLowerLimit: $("#RateLowerLimit").val(),

                IsOpen: $("#IsOpen").val(),
                BenefitCode: $("#BenefitCode").val(),
                RegionCode: $("#RegionCode").val(),
                BenefitCoverage: $("#BenefitCoverage").val()
            };

            console.log(arrData);

            $.ajax({
                method: "POST",
                url: "Api/Asuransi/SaveEditTemplateRKSAsuransi",
                data: JSON.stringify(arrData),
                dataType: "json",
                contentType: 'application/json; charset=utf-8',
                success: function (data) {
				//data = DOMPurify.sanitize(data);
                    alert('Berhasil Di Edit');
                    $('#exampleModal').modal('hide');
                    // $("#exampleModal").hide();
                    table.ajax.reload();
                }
            });
        }

    <script>
        $(document).ready(function () {

            var form = $('#ThisForm'),
                isOpenChk = $('#IsOpen'),
                chShipBlock = $('#changeShipInputs');
            chShipBlock.show();

            $('rate-range').show();

            $('rate-value').hide();

            isOpenChk.on('change', function () {
                if ($(this).is(':checked')) {
                    chShipBlock.hide();
                    $("#IsOpen").val(true);
                } else {
                    chShipBlock.show();
                    $("#IsOpen").val(false);
                }
            })

            $.getJSON("api/ReferenceData/Get", { qualifier: "QUALIFIER_INS_BENEF_TYPE" }, function (items) {
                $("select[name=Jenis]").append($("<option>", { value: "", text: "Pilih..." }));
                $.each(items, function (i, item) {
                    $("select[name=Jenis]").append($("<option>", { value : item.Code, text : item.LocalizedName }));
                });
                
            }).then(function () { 

                $.getJSON("/api/Asuransi/Get?documentId=" + $.getUrlVar("documentId"), null, function (data) {
				//data = DOMPurify.sanitize(data);
                    var doc = data;
                    $("input[name=DocumentTitle]").val(doc.DocumentTitle ? doc.DocumentTitle : "");
                    $("select[name=Jenis]").val(doc.BenefitType);
                });

            });


            $.getJSON("api/ReferenceData/Get", { qualifier: "QUALIFIER_INS_REGION" }, function (items) {
                $("select[name=RegionCode]").append($("<option>", { value: "", text: "Pilih..." }));
                $.each(items, function (i, item) {
                    $("select[name=RegionCode]").append($("<option>", { value: item.Code, text: item.LocalizedName }));
                });

            })

            $.getJSON("api/ReferenceData/Get", { qualifier: "QUALIFIER_INS_BENEF_COVERAGE" }, function (items) {
                $("select[name=BenefitCoverage]").append($("<option>", { value: "", text: "Pilih..." }));
                $.each(items, function (i, item) {
                    $("select[name=BenefitCoverage]").append($("<option>", { value: item.Code, text: item.LocalizedName }));
                });

            })

            $.getJSON("api/ReferenceData/Get", { qualifier: "QUALIFIER_INS_BENEFIT" }, function (items) {
                $("select[name=BenefitCode]").append($("<option>", { value: "", text: "Pilih..." }));
                $.each(items, function (i, item) {
                    $("select[name=BenefitCode]").append($("<option>", { value: item.Code, text: item.LocalizedName }));
                });
            })
        });

        function validateForm() {
            console.log("begin validation");
            var v = true;
            $('.form-validation-error').removeClass('form-validation-error');
            if ($("[name='Rate']").val() != '') {
                $("[name='Rate']").addClass('form-validation-error');
                v = false;
            }
            if ($("[name='Jenis']").val() == '') {
                $("[name='Jenis']").addClass('form-validation-error');
                v = false;
            }
            if (!v) $("form .form-validation-error").first().focus();
            return v;
        }

    </script>
