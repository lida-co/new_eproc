    <script>
        cekLogin(0)

        $(function () {
            table_list = $('#table-pencarian-rekanan').DataTable({
                "ajax": {
                    "url": 'api/NilaiVendor/rekananPencarian',
                    "type": 'POST',
                    "data": function (d) {
                        d.search = $("#txtcari").val();
                        d.status = $("#klasifikasi").val();
                        d.tipe = $("#TipeVendor").val();
                    },
                    "error": function (jqXHR, textStatus, errorThrown) {
                    }
                },
                "columns": [
                    { "data": "NamaVendor" },
                    { "data": "NomorVendor" },
                    { "data": "TipeVendor" },
                    { "data": "StatusSanksi" },
                    { "data": "null" },
                ],
                "columnDefs": [
                    {
                        "render": function (data, type, row) {
                            if (row.StatusSanksi == "SV01") {
                                return '<span class="label label-success" style="font-size:small;">No Warning</span>';
                            }
                            else if (row.StatusSanksi == "SV02") {
                                return '<span class="label label-warning" style="font-size:small;">Warning</span>';
                            }
                            else if (row.StatusSanksi == "SV04") {
                                return '<span class="label label-danger" style="font-size:small;">Penalty</span>';
                            }
                            else if (row.StatusSanksi == "SV03") {
                                return '<span class="label label-default" style="font-size:small;">Blacklist</span>';
                            }
                        },
                        "targets": 3,
                        //"orderable": false
                    },
                    {
                        "render": function (data, type, row) {
                            if (row.TipeVendor == "1") {
                                return '<p>Rekanan Lokal - Perusahaan</p>';
                            }
                            else if (row.TipeVendor == "2") {
                                return '<p>Rekanan Lokal - Perorangan</p>';
                            }
                            else if (row.TipeVendor == "3") {
                                return '<p>Principal</p>';
                            } else if (row.TipeVendor == "") {
                                return '<p></p>';
                            }
                        },
                        "targets": 2,
                        //"orderable": false
                    },
                    {
                        "render": function (data, type, row) {
                            //return '<a class="btn btn-sm btn-warning" id="" onclick="create(\'' + row.Id + '\')">Buat</a>';
                            return '<a href="rekanan-detail-v2.html?id=' + row.IdVendor + '" target="_blank" id="" class="btn btn-sm btn-primary "> Lihat </a>';
                            
                        },
                        "targets": 4,
                        //"orderable": false
                    },
                ],
                "serverSide": true,
                "paging": true,
                "lengthChange": false,
                "searching": false,
                "ordering": true,
                "info": true,
                "autoWidth": false,
                "responsive": true,
                "destroy": true
            });
        });

        function fungsicari() {
            table_list.draw();
        }

    </script>
