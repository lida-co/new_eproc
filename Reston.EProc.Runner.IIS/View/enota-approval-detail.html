        <script>
            const ENOTA_DETAIL_GET_URL = 'api/ENota/Get';
            const ENOTA_APPROVAL_WORKFLOW_DETAIL_GET_URL = 'api/ENota/GetApprovalWorkflowDetail';
            const ENOTA_APPROVAL_WORKFLOW_DETAIL_UPDATE_URL = 'api/ENota/UpdateApprovalWorkflowDetail';
            const ENOTA_DOCUMENT_VIEWER_URL = 'api/ENota/DocumentViewer';

            var eNotaContentEditor;

            $(document).ready(function () {
                initCsrf();
            });

            // Optional: Provide a way to get current token
            function getCsrfToken() {
                return csrfToken;
            }

            $(document).ready(function () {

                showProgressBar('#interactionBlockerModal');

                new Promise((resolve, reject) => {

                    var q = parseQueryString();
                    if (!q.docId)
                        return reject('Document Id is required');

                    $.ajax({
                        url: ENOTA_APPROVAL_WORKFLOW_DETAIL_GET_URL + '?docId=' + q.docId,
                        method: 'GET',
                        success: resolve,
                        error: reject
                    });
                }).then((data) => {
                    console.log('ApprovalWorkflowDetail', data);
                    // start populating wf detail here
                    if (!data.Detail)
                        return Promise.reject("Unexpected response data format", data);

                    let dtl = data.Detail;
                    let approvalDecissionElem = null;
                    if (!isNullOrEmpty(dtl.ApprovalDecission)) {
                        // this person has made approval decission
                        approvalDecissionElem = ApprovalPanel(
                            dtl.Id
                            , dtl.ApproverPersonelName || ''
                            , dtl.ApproverPersonelPosition || ''
                            , dtl.ApprovalDecission || ''
                            , dtl.ApprovalDecissionDate || ''
                            , dtl.ApprovalNotes || ''
                            , true
                        );
                    } else {
                        // this person has not made approval decission
                        approvalDecissionElem = ApprovalPanel(
                            dtl.Id
                            , dtl.ApproverPersonelName
                            , dtl.ApproverPersonelPosition
                            , dtl.ApprovalDecission
                            , dtl.approvalDecissionDate
                            , dtl.approvalNotes
                            , false
                        );
                    }

                    $('.approvals-tab-content-container').empty();
                    $('.approvals-tab-content-container').append(approvalDecissionElem);
                    $('.approvals-tab-content-container').on('click', '.btn-approval-decission', function (e) {
                        let elem = $(e.target);

                        let approvalBoxElem = elem.closest('.approval-box');
                        if (!approvalBoxElem || approvalBoxElem.length == 0) return;
                        let approvalWfDetailId = approvalBoxElem.data('approval-request-id');
                        if (!approvalWfDetailId) return;

                        let decission = '';
                        // get which decission button was clicked
                        if ($(elem).hasClass('btn-approval-decission-approve')) {
                            decission = '0';
                        } else if ($(elem).hasClass('btn-approval-decission-reject')) {
                            decission = '1';
                        } else if ($(elem).hasClass('btn-approval-decission-approve-notes')) {
                            decission = '2';
                        } else if ($(elem).hasClass('btn-approval-decission-revision')) {
                            decission = '3';
                        }

                        let decissionNote = approvalBoxElem.find('.input-approval-decission-note').val();

                        let vm = populateViewModel();
                        let valResult = validateViewModel(vm, decission);
                        if (!isValidationResultEmpty(valResult)) {
                            handleValidationResult(valResult);
                            return;
                        }

                        // ask confirmation before continuing
                        if (!confirm('Yakin akan melanjutkan?')) return;

                        var headers = {};
                        if (csrfToken) {
                            headers['X-CSRF-Token'] = csrfToken;
                            headers['X-XSRF-TOKEN'] = csrfToken;
                        }

                        new Promise((resolve3, reject3) => {
                            showProgressBar('#interactionBlockerModal');
                            $.ajax({
                                url: ENOTA_APPROVAL_WORKFLOW_DETAIL_UPDATE_URL,
                                method: 'POST',
                                contentType: 'application/json',
                                headers: headers,
                                data: JSON.stringify({
                                    Header: {},
                                    Detail: {
                                        Id: approvalWfDetailId,
                                        ApprovalDecission: decission,
                                        ApprovalNotes: decissionNote,
                                    }
                                }),
                                success: resolve3,
                                error: reject3
                            });
                        }).then(() => {
                            showMessage('success', 'Tanggapan berhasil disimpan. Harap tunggu sementara server mengalihkan halaman ini...', true, '.messages');
                            window.location.href = "/enota-approval-list.html";
                        }).catch((err) => {
                            console.error(err.responseText);
                            showMessage('error', 'Tanggapan gagal disimpan.', true, '.messages', err.responseText);
                        }).finally(() => {
                            hideProgressBar('#interactionBlockerModal');
                        });

                    });

                    $.ajax({
                        url: `/api/enota/riwayatDokumen?Id=` + data.Detail.ENotaId,
                        method: "GET",
                        success: function (data) {
                            const $list = $("#result").empty(); // kosongkan dulu

                            const items = Array.isArray(data) ? data : [data];

                            items.forEach(item => {
                                const tgl = new Date(item.CreateDate)
                                    .toLocaleString("id-ID", { dateStyle: "short", timeStyle: "short" });

                                // Buat <li> baru
                                const $li = $("<li>");

                                // Tambahkan teks tanggal dan konten
                                $li.append(`${tgl} - ${item.Content}`);

                                // Jika ada file_base64, buat link download
                                if (item.AttactmentPenawaranFiles) {
                                    const byteCharacters = atob(item.AttactmentPenawaranFiles);
                                    const byteNumbers = new Array(byteCharacters.length);
                                    for (let i = 0; i < byteCharacters.length; i++) {
                                        byteNumbers[i] = byteCharacters.charCodeAt(i);
                                    }
                                    const byteArray = new Uint8Array(byteNumbers);
                                    const blob = new Blob([byteArray], { type: item.AttactmentPenawaranType || "application/octet-stream" });
                                    const url = URL.createObjectURL(blob);

                                    const $downloadLink = $("<a>")
                                        .attr("href", url)
                                        .attr("download", item.AttactmentPenawaranFiles || "file")
                                        .text(item.AttactmentPenawaran);

                                    $li.append("<br> File Penawaran: ").append($downloadLink);
                                }

                                // Jika ada file_base64, buat link download
                                if (item.AttachtmentAnalisaFile) {
                                    const byteCharacters = atob(item.AttachtmentAnalisaFile);
                                    const byteNumbers = new Array(byteCharacters.length);
                                    for (let i = 0; i < byteCharacters.length; i++) {
                                        byteNumbers[i] = byteCharacters.charCodeAt(i);
                                    }
                                    const byteArray = new Uint8Array(byteNumbers);
                                    const blob = new Blob([byteArray], { type: item.AttachtmentAnalisaType || "application/octet-stream" });
                                    const url = URL.createObjectURL(blob);

                                    const $downloadLink = $("<a>")
                                        .attr("href", url)
                                        .attr("download", item.AttachtmentAnalisaFile || "file")
                                        .text(item.AttachtmentAnalisa);

                                    $li.append("<br> File Analisa: ").append($downloadLink);
                                }

                                // Jika ada file_base64, buat link download

                                // Jika ada file_base64, buat link download
                                if (item.AttachmentLampiranFile) {
                                    const byteCharacters = atob(item.AttachmentLampiranFile);
                                    const byteNumbers = new Array(byteCharacters.length);
                                    for (let i = 0; i < byteCharacters.length; i++) {
                                        byteNumbers[i] = byteCharacters.charCodeAt(i);
                                    }
                                    const byteArray = new Uint8Array(byteNumbers);
                                    const blob = new Blob([byteArray], { type: item.AttachmentLampiranType || "application/octet-stream" });
                                    const url = URL.createObjectURL(blob);

                                    const $downloadLink = $("<a>")
                                        .attr("href", url)
                                        .attr("download", item.AttachmentLampiranFile || "file")
                                        .text(item.AttachmentLampiran);

                                    $li.append("<br> File Analisa: ").append($downloadLink);
                                }
                                $li.append("<hr>");
                                $list.append($li);
                            });
                        },
                        error: xhr => console.error(xhr.responseText)
                    });

                    // render the rest of approvers
                    $('.approvals-tab-content-container').append($('<hr/>'));
                    if (dtl.OtherApprovalRequests && Array.isArray(dtl.OtherApprovalRequests)) {

                        for (var otherDtl of dtl.OtherApprovalRequests) {
                            let otherDtlElem = ApprovalPanel(
                                otherDtl.Id
                                , otherDtl.ApproverPersonelName || ''
                                , otherDtl.ApproverPersonelPosition || ''
                                , otherDtl.ApprovalDecission || 'Belum ada tanggapan'
                                , otherDtl.ApprovalDecissionDate || ''
                                , otherDtl.ApprovalNotes || ''
                                , true
                            );

                            $('.approvals-tab-content-container').append(otherDtlElem);
                        }
                    }

                    // fetch enota data
                    if (data.Detail && data.Detail.ENotaId) {
                        return new Promise((resolve2, reject2) => {
                            $.ajax({
                                url: ENOTA_DETAIL_GET_URL + '?docId=' + data.Detail.ENotaId,
                                method: 'GET',
                                success: resolve2,
                                error: reject2
                            });
                        });
                    } else {
                        reject("Could not resolve attached ENota document");
                    }
                }).then((data) => {
                    console.log('ENota', data);
                    populateView(document, data);

                    // activate tabs
                    $('#tabs a').click((e) => {
                        e.preventDefault()
                        $(this).tab('show')
                    });
                }).catch((err) => {
                    showMessage('error', 'Gagal memuat dokumen. [' + err + ']', true, '.messages');
                }).finally(() => {
                    hideProgressBar('#interactionBlockerModal');
                });

                $('.file-chooser').on('click', '.file-upload-item', (e) => {
                    e.preventDefault();
                    let fileChooserElem = $(this);
                    let contentTitle = fileChooserElem.find('.fileupload-item-title').data('item-title');
                    let contentType = fileChooserElem.find('.fileupload-item-content-type').html();
                    let contentData = fileChooserElem.find('.fileupload-item-data-b64').html();

                    downloadDocument(contentTitle, contentType, contentData);
                    return false;

                });


                eNotaContentEditor = new Quill('#eNota-editor', {
                    theme: 'snow',
                    readOnly: true,
                    modules: {
                        toolbar: false
                    }
                });


            });


            function createViewModel() {
                let vm = {
                    Id: null,
                    DocumentNo: '',
                    DecissionNote: '',
                };

                return vm;

            }

            function populateViewModel(parent, viewModel) {
                const root = parent == null ? $(document) : $(parent);
                const vm = viewModel == null ? createViewModel() : viewModel;

            function validateViewModel(viewModel, action) {

                let validationResult = {

                }
                if (viewModel.DecissionNote.length > 200) {
                    validationResult.DecissionNote.push("Maksimum 200 karakter.");
                }

                return validationResult;
            }

            function handleValidationResult(validationResults) {
                $('.validatable').removeClass('has-error');
                $('.validatable .help-block').remove();
                for (let key in validationResults) {
                    if (validationResults.hasOwnProperty(key)) {
                        let elemIdOrName = key;
                        let validationMessages = validationResults[key]; // array

                        if (!Array.isArray(validationMessages) || validationMessages.length == 0) {
                            // if the validation messages array is empty
                            // then this element does not have offending
                            // validation. Continue to the next element.
                            continue;
                        }

                        if (elemIdOrName == 'DecissionNote') {
                            highlighError('input[name="ApprovalDecissionNote"]', validationMessages);
                        }
                    }
                }
            }

            function isValidationResultEmpty(valResultObj) {
                // Check if valResult is null or undefined
                if (valResultObj === null || valResultObj === undefined) {
                    return true;
                }

                // Check if valResult has no properties
                if (Object.keys(valResultObj).length === 0) {
                    return true;
                }

                // Check if all properties' arrays are empty
                for (const property in valResultObj) {
                    if (valResultObj.hasOwnProperty(property) && Array.isArray(valResultObj[property]) && valResultObj[property].length > 0) {
                        return false; // At least one non-empty array found
                    }
                }

                // If all properties' arrays are empty or undefined, valResult is considered empty
                return true;
            }

            function highlighError(selector, msg) {
                let elem = $(selector);
                let formGroupElem = elem.closest('.form-group');
                let message = '';
                if (Array.isArray(msg)) {
                    message = msg.reduce((accumulator, currentValue) => {
                        return accumulator + (', ' + currentValue);
                    }, '');
                } else {
                    message = msg;
                }
                // remove leading comma
                if (message.startsWith(', ')) message = message.slice(2);

                let helpBlockElem = $('<span class="help-block">' + message + '</span>');
                formGroupElem.find('.help-block').remove(); // remove any help-block element before adding
                formGroupElem.append(helpBlockElem); // then add
                formGroupElem.addClass('has-error'); // then highlight
            }

            // Utility Function
            function isNullOrEmpty(value) {
                return value === null || // Check for null
                    (typeof value === 'object' && Object.keys(value).length === 0) || // Check for an empty object
                    (typeof value === 'string' && value.trim().length === 0); // Check for an empty string
            }

            // Utility function
            function parseQueryString() {
                var queryString = window.location.search.slice(1);
                var params = {};
                queryString.split("&").forEach(function (pair) {
                    var parts = pair.split("=");
                    var key = decodeURIComponent(parts[0]);
                    var value = decodeURIComponent(parts[1] || "");

                    params[key] = value;
                });
                return params;
            }

            // UI Utility Function
            function showMessage(msgType, msg, clear, selector, hiddenMsg) {
                let className = '';
                switch (msgType) {
                    case 'success':
                        className = 'alert-success';
                        break;
                    case 'info':
                        className = 'alert-info';
                        break;
                    case 'warning':
                        className = 'alert-warning';
                        break;
                    case 'danger':
                    case 'error':
                        className = 'alert-danger';
                        break;
                    default:
                        className = 'alert-success';

                }

                let msgEl = $('<li><div class="alert alert-dismissible ' + className + '">'
                    + (hiddenMsg ? '<span class="hidden">' + hiddenMsg + '</span>' : '')
                    + '<button type="button" class="close" data-dismiss="alert" aria-label="Close"><span aria-hidden="true">&times;</span></button>'
                    + msg
                    + '</div></li>');

                if (clear) {
                    $(selector).empty();
                }
                $(selector).append(msgEl);

            }

            function formatISODate(inputISODate) {
                if (!inputISODate) return '';

                const date = new Date(inputISODate);
                const currentDate = new Date();

                // Get date components
                const year = date.getFullYear().toString().slice(-4); // Get last two digits of the year
                const monthNameShort = date.toLocaleString('default', { month: 'short' }); // Get local month name
                const month = ('0' + (date.getMonth() + 1)).slice(-2); // Get two-digit month
                //const day = ('0' + date.getDate()).slice(-2); // Get two-digit day
                const day = ('0' + date.getDate()).slice(-2); // Get two-digit day
                const hour = ('0' + date.getHours()).slice(-2); // Get two-digit hours
                const minute = ('0' + date.getMinutes()).slice(-2); // Get two-digit minutes


                // Format as 'YY-MM-DD'
                //const formattedDate = `${day}-${monthNameShort}-${year} ${hour}:${minute}`;
                const formattedDate = `${day ? ` ${day} ${monthNameShort}` : ''}${year ? ` ${year}` : ''} ${hour}:${minute}`;

                return formattedDate;
            }

            // Utility function
            function downloadDocument(contentTitle, contentType, contentDataBase64) {
                var binaryData = atob(contentDataBase64);
                var arrayBuffer = new ArrayBuffer(binaryData.length);
                var uint8Array = new Uint8Array(arrayBuffer);
                for (var i = 0; i < binaryData.length; i++) {
                    uint8Array[i] = binaryData.charCodeAt(i);
                }
                var blob = new Blob([arrayBuffer], { type: contentType });
                var a = document.createElement("a");
                a.href = window.URL.createObjectURL(blob);
                a.download = contentTitle;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            }
