    <script>

        var table212;

        $(function () {
            $("#pengadaanId").val(window.location.hash.replace("#", ""));
            load_table_penawaran();
            loadData();
        });

        function loadData() {
            $.ajax({
                method: "POST",
                url: ($("#pengadaanId").val() == "") ? "Api/PengadaanE/detailPengadaan?Id=" + id_rks : "Api/PengadaanE/detailPengadaan?Id=" + $("#pengadaanId").val(),
                dataType: "json"
            }).done(function (data) {
                $("#judul").text(data.Judul);
                $("#deskripsi").text(data.AturanPengadaan + ", " + data.AturanBerkas + ", " + data.AturanPenawaran);
                $("#aturan-pengadaan").val(data.AturanPengadaan);
                $("#keterangan").text(data.Keterangan);
                $("#judul-page").html("RKS " + data.Judul);
                // $("#idRks").val(data.RKSHeaderId);
                if (data.isTEAM == 1 || data.isCreated == 1) {
                    $("#simpan").show();
                }
                if (data.isTEAM != 1 && data.isCreated != 1) {
                    var column = table.column(6);
                    column.visible(false);//!column.visible()
                    $(".simpan").remove();
                    $(".edit").remove();
                    $(".right").remove();
                    $(".left").remove();
                    $(".add").remove();
                }
                if (data.Status > 0) {
                    var column = table.column(6);
                    column.visible(false);//!column.visible()
                    $(".simpan").remove();
                    $(".edit").remove();
                    $(".right").remove();
                    $(".left").remove();
                    $(".add").remove();
                }
                $("#pengadaanId").val(data.Id);
                $("#region").val(data.Region)
            });
        }

        // Start of Edit
        $("#example").on("click", ".edit-item", function () {
            EditConfirmation($(this).attr("idIsi"));
        });
        function EditConfirmation(ide) {
            $("#tobeEdit").val(ide);
            $("#exampleModal").modal('show');
            Edit(ide);
        }

        function Edit(ide) {
            $.ajax({
                method: "POST",
                url: "Api/PengadaanE/GetDetailBenef?Id=" + ide,
                dataType: "json"
            }).done(function (data) {
                clear();
                console.log("doc data:", data);
                $('#BenefitCode').val(data.BenefitCode);
                $('#RegionCode').val(data.RegionCode);
                $('#BenefitCoverage').val(data.BenefitCoverage);
                $('#RateLowerLimit').val(data.RateLowerLimit);
                $('#RateUpperLimit').val(data.RateUpperLimit);
                $('#Rate').val(data.Rate);
                $('#IsRange').val(String(data.IsRange));
                show(String(data.IsRange));

                if (String(data.IsOpen) == "true") {
                    $('#IsOpen').attr("checked", true);
                }
                else {
                    $('#IsOpen').attr("checked", false);
                }

                $("#HargaId").val(data.HargaId);
            });
        }

        function clear() {
            //alert("ngapus kudunya");
            document.getElementById("BenefitCode").value = "";
            document.getElementById("RegionCode").value = "";
            document.getElementById("BenefitCoverage").value = "";
            document.getElementById("RateLowerLimit").value = "";
            document.getElementById("RateUpperLimit").value = "";
            document.getElementById("Rate").value = "";
            document.getElementById("changeShipInputs").value = "";
            $('#IsOpen').val();
        }

        function show(aval) {
            if (aval == "true") {
                raterange.style.display = 'inline';
                ratevalue.style.display = 'none';
                //Form.fileURL.focus();
            }
            else {
                raterange.style.display = 'none';
                ratevalue.style.display = 'inline';
            }
        };

        function load_table_penawaran() {
            // insert pertama kali ke table HargaRekananAsuransi
            table212 = $('#example').DataTable({
                "serverSide": true,
                "searching": false,
                "ajax": {
                    "url": '/Api/PengadaanE/GetListBenefitRateHargaAsuransi?PengadaanId=' + $("#pengadaanId").val(), //6298c3a9-cf12-477a-bc00-f311703b9477', //?documentId=" + $.getUrlVar("documentId")
                    "type": 'POST',
                    "data": function (d) {
                        console.log("d: ", d);
                    },
                    "error": function (jqXHR, textStatus, errorThrown) {
                    }
                },
                "columns": [
                    { "data": "BenefitCode" },
                    { "data": "BenefitCoverage" },
                    { "data": "RegionCode" },
                    { "data": "RateLowerLimit" },
                    { "data": "RateUpperLimit" },
                    { "data": null },
                ],
                "columnDefs": [
                    {
                        "render": function (data, type, row) {
                            //var html = '<a style="margin-left: 5px;"  class="btn btn-success btn-sm product-title"><span class="fa fa-edit"></span> Edit </a>';
                            //html = html + '<a style="margin-left: 5px;"  class="btn btn-danger remove-item btn-sm product-title"><span class="fa fa-trash-o"></span> Hapus</a>';
                            if (data.IsOpen === true){
                                var html = '<a style="display: none;" idIsi="' + row.Id + '" class="btn btn-danger edit-item btn-sm product-title"><span class="fa fa-file"></span> Isi Rate Benefit</a>';
                                return html;
                            } else {
                                var html = '<a style="text-align:center" idIsi="' + row.Id + '" class="btn btn-danger edit-item btn-sm product-title"><span class="fa fa-file"></span> Isi Rate Benefit</a>';
                                return html;
                            }
                            //var html = '<a style="text-align:center" idIsi="' + row.Id + '" class="btn btn-danger edit-item btn-sm product-title"><span class="fa fa-file"></span> Isi Rate Benefit</a>';
                            //    return html;
                        },

                        "targets": 5,
                        "orderable": false
                    }
                ],
                "createdRow": function (row, data, dataIndex) {
                    console.log("data: ", data);
                    if (data.IsRange === false) {
                        // Add COLSPAN attribute
                        $('td:eq(3)', row).attr('colspan', 2);

                        // Center horizontally
                        $('td:eq(3)', row).attr('align', 'center');

                        // Hide required number of columns
                        // next to the cell with COLSPAN attribute
                        $('td:eq(4)', row).css('display', 'none');
                        //$('td:eq(3)', row).css('display', 'none');

                        // Update cell data
                        this.api().cell($('td:eq(3)', row)).data(data.Rate);
                    }
                    //alert(data.IsOpen);
                    if (data.IsOpen === true) {
                        // Add COLSPAN attribute
                        $('td:eq(3)', row).attr('colspan', 2);

                        // Center horizontally
                        $('td:eq(3)', row).attr('align', 'center');

                        // Hide required number of columns
                        // next to the cell with COLSPAN attribute
                        $('td:eq(4)', row).css('display', 'none');
                        //$('td:eq(3)', row).css('display', 'none');

                        // Update cell data
                        this.api().cell($('td:eq(3)', row)).data('Perlu Underwriting');
                    }
                },
                "paging": false,
                "lengthChange": false,
                "ordering": false,
                "info": false,
                "autoWidth": false,
                "responsive": true,
            });
        }

        $("#SimpanPenawaran").on("click", function () {
            var arrData = {
                HargaId : $("#HargaId").val(),
                Rate : $("#Rate").val(),
                RateLowerLimit : $("#RateLowerLimit").val(),
                RateUpperLimit : $("#RateUpperLimit").val()
            };

            console.log(arrData);

            $.ajax({
                method: "POST",
                url: "Api/Asuransi/savePenawaranAsuransi",
                data: JSON.stringify(arrData),
                dataType: "json",
                contentType: 'application/json; charset=utf-8',
                success: function (data) {
                    $("#exampleModal").modal('hide');
                    table212.ajax.reload();
                }
            });
        });
        // end of Edit

        $("#simpankembali").on("click", function () {
            $("#modal-simpan-ulul").modal('show');
        });

        $("#kembali-ulul").on("click", function () {
            window.location.replace(HOME_PAGE + "/rekanan-side-detail-pengadaan.html#" + parseInt(("#pengadaanId").val()));
        });

        $(".refresh").on("click", function () {
            window.location.reload();
        });

    </script>
