            <script>
                const EMEMO_GET_URL = 'api/EMemo/Get';
                const EMEMO_CREATE_URL = 'api/EMemo/Create';
                const EMEMO_UPDATE_URL = 'api/EMemo/Update';
                const EMEMO_APPROVAL_CREATE_URL = 'api/EMemo/CreateApprovalWorkflow';
                const PERSONEL_SEARCH_URL = 'api/EMemo/SearchPersonels';
                const EMEMO_TEMPLATE_SEARCH_URL = 'api/ememo/SearchEMemoTemplates';
                const EMEMO_TEMPLATE_GET_URL = 'api/ememo/GetEMemoTemplate';
                const PERSONEL_SEARCH_WAIT_TIME = 500; //milliseconds
                const PERSONEL_SEARCH_MIN_CHAR_COUNT = 3;
                let personelSearchTimeout; // setTimeout return
                let templateSearchTimeout; // setTimeout return

                var eMemoContentEditor;

                $(document).ready(function () {
                    initCsrf();
                });

                function getCsrfToken() {
                    return csrfToken;
                }

                $(document).ready(function () {

                    showProgressBar('#interactionBlockerModal');

                    // Load everything for the initial page view
                    new Promise(function (resolve, reject) {
                        // .select-work-unit onload
                        $.get('api/ememo/getWorkUnits?sel=', function (response) {
                            let workUnitList = (typeof response === 'string' ? JSON.parse(response) : response);
                            $('#select-work-unit').empty();
                            $('#select-work-unit').append($('<option value=""></option>'));
                            if (workUnitList && Array.isArray(workUnitList)) {
                                for (const workUnit of workUnitList) {
                                    let optElem = $('<option value="' + workUnit.Value + '" ' + (workUnit.IsSelected ? 'selected' : '') + '>' + workUnit.Label + '</option>');
                                    $('#select-work-unit').append(optElem);
                                }
                                resolve();
                            } else {
                                reject('Invalid response');
                            }
                        });
                    }).then(() => {
                        return new Promise((resolve2, reject2) => {
                            var q = parseQueryString();
                            if (!q.docId)
                                return reject2('Document Id is required');

                            $.ajax({
                                url: EMEMO_GET_URL,
                                method: 'GET',
                                data: {
                                    docId: q.docId
                                },
                                success: resolve2,
                                error: reject2
                            });
                        });
                    }).then((data) => {

                        populateView(document, data);
                    }).catch((err) => {
                        console.log(err);
                        showMessage('error', 'Failed to load resource.', true, '.messages', err.responseText);
                    }).finally(function () {
                        hideProgressBar('#interactionBlockerModal');
                    });

                    $('.ememo-maindoc-editor').show();
                    $('.ememo-maindoc-filechooser').hide();
                    $('input[name="MainDocContentType"]').val('text/html');



                    // .personel-modal onclose
                    $('.personel-modal').on('hidden.bs.modal', function () {
                        // clear source list id
                        $('.personel-modal').data('list-target-id', '');
                    });

                    // .btn-user-select onclick
                    $('.btn-user-select').on('click', function (e) {
                        const inputListElem = $(e.target).closest(".input-list-wrapper").find('.input-list').first();
                        if (!inputListElem) return;
                        const inputListElemId = inputListElem.attr('id');
                        if (!inputListElemId) return;

                        $('.personel-modal').modal('hide');
                        $('.personel-modal').data('list-target-id', inputListElemId);
                        $('.personel-modal .personel-list').empty();

                        //let start = $('personel-list-more').data('offset') || 0;
                        //let limit = $('personel-list-more').data('length') || 7;
                        let start = 0;
                        let limit = 7;
                        $.get(PERSONEL_SEARCH_URL + '?start=' + start + '&limit=' + limit + '&search=', function (data) {
                            let response = (typeof data === 'string' ? JSON.parse(data) : data);
                            if (response.Details && Array.isArray(response.Details)) {
                                for (const personel of response.Details) {
                                    const listItem = $(
                                        '<li class="item personel-list-item" style="padding:.7em 0;" data-personel-id="' + personel.Id + '" data-personel-label="' + personel.DisplayName + '">'
                                        + '<a class="">' + personel.DisplayName + '</a>'
                                        + '</li>'
                                    );

                                    $('.personel-modal .personel-list').append(listItem);
                                    $('.personel-modal').modal('show');
                                }
                                $('personel-list-more').data('offset', start + limit);
                                $('personel-list-more').data('length', limit);
                            }
                        }).fail(function (jqXHR, status, err) {
                            console.log(jqXHR, status, err);
                            showMessage('error', 'Failed to load resource. ' + err, true, '.messages', DOMPurify.sanitize(jqXHR.responseText));
                            $('.personel-modal').modal('hide');
                        });
                    });

                    $('#search-personel').on('keyup', (e) => {

                        var searchQuery = $('#search-personel').val();
                        if (searchQuery.length >= PERSONEL_SEARCH_MIN_CHAR_COUNT) {
                            if (personelSearchTimeout) {
                                clearTimeout(personelSearchTimeout);
                            }

                            personelSearchTimeout = setTimeout(() => {
                                $.ajax({
                                    url: PERSONEL_SEARCH_URL,
                                    method: 'GET',
                                    data: {
                                        start: 0,
                                        limit: 7,
                                        search: searchQuery
                                    },
                                    success: (data) => {
                                        let response = (typeof data === 'string' ? JSON.parse(data) : data);
                                        if (response.Details && Array.isArray(response.Details)) {
                                            $('.personel-modal .personel-list').empty();
                                            for (const personel of response.Details) {
                                                const listItem = $(

                    // This handler is needed to prevent the click event being

                    // infinite loop
                    $('.file-chooser-input').on('click', function (e) {
                        e.stopPropagation();
                    });

                    $('.file-chooser-input').on('change', function (e) {
                        const el = $(e.target);
                        if (!el || el.length != 1) return;

                        const fileChooserElem = el.closest('.file-chooser');
                        const maxFileCount = fileChooserElem.data('max-items');
                        const maxFileSize = fileChooserElem.data('max-size');

                        if (el[0].files.length > maxFileCount) {
                            window.alert('Jumlah file yang bisa di lampirkan pada area ini maksimal ' + maxFileCount + ' buah.');
                            return;
                        }

                        const fileChooserFileListElem = el.closest('.file-chooser').find('.file-chooser-file-list').first();
                        if (!fileChooserFileListElem) return;
                        fileChooserFileListElem.empty();

                        // process each files and append <input type="hidden" element to b64EncListElem
                        if (el[0].files.length > 0) {

                            // maximum number of files to choose is 5
                            if (el[0].files.length > 5) return;

                            for (let i = 0; i < el[0].files.length; i++) {
                                let file = el[0].files[i];

                                // check maximum file size
                                if (file.size > maxFileSize) {
                                    window.alert('Ukuran file yang bisa di lampirkan pada area ini maksimal ' + maxFileSize + ' byte.');
                                    continue;
                                }

                                let reader = new FileReader();
                                reader.onload = function () {
                                    //console.log(reader.result);
                                    const data = reader.result.split(';');
                                    if (data.length < 2) return;
                                    const fileName = file.name;
                                    const fileSize = file.size;
                                    const fileContentType = data[0].replace(/data:/, '');
                                    const fileDataB64 = data[1].replace(/base64,/, '');

                                    fileChooserFileListElem.append(FileChooserFileItem(
                                        fileName,
                                        fileSize,
                                        fileContentType,
                                        fileDataB64
                                    ));
                                }
                                reader.readAsDataURL(file);
                            }
                        }

                    });

                function validateViewModel(viewModel, action) {

                    let validationResult = {
                        DocumentNo: [],
                        WorkUnitCode: [],
                        InternalRefNo: [],
                        Subject: [],
                        Kepada: [],
                        Tembusan: [],
                        HPSAmount: [],
                        Isi: [],
                        PenawaranAttachments: [],
                        CostBenefitAttachments: [],
                        OtherAttachments: [],
                        Validators: [],
                        Approvers: [],
                    };

                    if (action == 'save-draft') {
                        // - viewModel.WorkUnitCode wajib isi
                        if (isNullOrEmpty(viewModel.WorkUnitCode)) {
                            validationResult.WorkUnitCode.push("Wajib diisi.");
                        }

                        // -viewModel.Subject wajib isi
                        if (isNullOrEmpty(viewModel.Subject)) {
                            validationResult.Subject.push("Wajib diisi.");
                        }
                        if (viewModel.Subject.length > 150) {
                            validationResult.Subject.push("Maksimum 150 karakter.");
                        }
                    } else if (action == 'submit') {
                        // - viewModel.DocumentNo wajib isi
                        if (isNullOrEmpty(viewModel.DocumentNo)) {
                            validationResult.DocumentNo.push("Wajib diisi. Simpan dokumen sebagai draft untuk mendapatkan nomor dokumen.");
                        }
                        // - viewModel.DocumentNo max 150 char
                        if (viewModel.DocumentNo.length > 150) {
                            validationResult.DocumentNo.push("Maksimum 150 karakter.");
                        }
                        // - viewModel.WorkUnitCode wajib isi
                        if (isNullOrEmpty(viewModel.WorkUnitCode)) {
                            validationResult.WorkUnitCode.push("Wajib diisi.");
                        }
                        // - viewModel.InternalRefNo max 150 char
                        if (viewModel.InternalRefNo.length > 150) {
                            validationResult.InternalRefNo.push("Maksimum 150 karakter.");
                        }
                        // - viewModel.Subject wajib isi
                        if (isNullOrEmpty(viewModel.Subject)) {
                            validationResult.Subject.push("Wajib diisi.");
                        }
                        // - viewModel.Subject max 150 char
                        if (viewModel.Subject.length > 150) {
                            validationResult.Subject.push("Maksimum 150 karakter.");
                        }
                        // - viewModel.Kepada wajib isi
                        if (isNullOrEmpty(viewModel.Kepada)) {
                            validationResult.Kepada.push("Wajib diisi.");
                        }// - viewModel.Kepada wajib isi
                        if (isNullOrEmpty(viewModel.HPSAmount)) {
                            validationResult.HPSAmount.push("Wajib diisi.");
                        }
                        // - viewModel.Kepada max 150 char
                        if (viewModel.Kepada.length > 150) {
                            validationResult.Kepada.push("Maksimum 150 karakter.");
                        }
                        // - viewModel.Tembusan max 150 char
                        if (viewModel.Tembusan.length > 150) {
                            validationResult.Tembusan.push("Maksimum 150 karakter.");
                        }
                        // - viewModel.PenawaranAttachments max 5 item
                        if (Array.isArray(viewModel.PenawaranAttachments) && viewModel.PenawaranAttachments.length > 5) {
                            validationResult.PenawaranAttachments.push("Maksimum 5 item.");
                        }
                        // - viewModel.CostBenefitAttachments max 5 item
                        if (Array.isArray(viewModel.CostBenefitAttachments) && viewModel.CostBenefitAttachments.length > 5) {
                            validationResult.CostBenefitAttachments.push("Maksimum 5 item.");
                        }
                        // - viewModel.OtherAttachments max 5 item
                        if (Array.isArray(viewModel.OtherAttachments) && viewModel.OtherAttachments.length > 5) {
                            validationResult.OtherAttachments.push("Maksimum 5 item.");
                        }
                        // - viewModel.Validators wajib isi
                        if (Array.isArray(viewModel.Validators) && viewModel.Validators.length == 0) {
                            validationResult.Validators.push('Wajib diisi.');
                        }
                        // - viewModel.Validators max 5 item
                        if (Array.isArray(viewModel.Validators) && viewModel.Validators.length > 5) {
                            validationResult.Validators.push('Maksimum 5 item.');
                        }
                        // - viewModel.Approvers wajib isi
                        if (Array.isArray(viewModel.Approvers) && viewModel.Approvers.length == 0) {
                            validationResult.Approvers.push('Wajib diisi.');
                        }
                        // - viewModel.Approvers max 5 item
                        if (Array.isArray(viewModel.Approvers) && viewModel.Approvers.length > 5) {
                            validationResult.Approvers.push('Maksimum 5 item.');
                        }

                        // validasi isi
                        // Agak lain memang
                        if (viewModel.ContentInputMode == 'edit') {
                            if (eMemoContentEditor && eMemoContentEditor.getLength() <= 1) { // empty quill editor still has a '\n' character in it
                                validationResult.Isi.push('Wajib isi.');
                            }
                        } else if (viewModel.ContentInputMode == 'upload') {
                            if (isNullOrEmpty(viewModel.ContentData)) {
                                validationResult.Isi.push('Wajib isi.');
                            }
                        }
                    }

                    return validationResult;
                }

                function handleValidationResult(validationResults) {

                    $('.validatable').removeClass('has-error');
                    $('.validatable .help-block').remove();

                    for (let key in validationResults) {
                        if (validationResults.hasOwnProperty(key)) {
                            let elemIdOrName = key;
                            let validationMessages = validationResults[key]; // array

                            if (!Array.isArray(validationMessages) || validationMessages.length == 0) {
                                // if the validation messages array is empty
                                // then this element does not have offending
                                // validation. Continue to the next element.
                                continue;
                            }

                            if (elemIdOrName == 'DocumentNo') {
                                highlighError('#DocumentNo', validationMessages);

                            } else if (elemIdOrName == 'WorkUnitCode') {
                                highlighError('select[name="WorkUnitCode"]', validationMessages);

                            } else if (elemIdOrName == 'InternalRefNo') {
                                highlighError('#InternalRefNo', validationMessages);

                            } else if (elemIdOrName == 'Subject') {
                                highlighError('#Subject', validationMessages);

                            } else if (elemIdOrName == 'Kepada') {
                                highlighError('#Kepada', validationMessages);

                            } else if (elemIdOrName == 'Tembusan') {
                                highlighError('#Tembusan', validationMessages);

                            } else if (elemIdOrName == 'HPSAmount') {
                                highlighError('#HPSAmount', validationMessages);

                            } else if (elemIdOrName == 'Isi') {
                                highlighError('input[name="MainDocContentType"]', validationMessages); // agak lain memang

                            } else if (elemIdOrName == 'PenawaranAttachments') {
                                highlighError('.file-chooser-penawaran', validationMessages);

                            } else if (elemIdOrName == 'CostBenefitAttachments') {
                                highlighError('.file-chooser-costbenef', validationMessages);

                            } else if (elemIdOrName == 'OtherAttachments') {
                                highlighError('.file-chooser-other', validationMessages);

                            } else if (elemIdOrName == 'Validators') {
                                highlighError('#input-list-validator', validationMessages);

                            } else if (elemIdOrName == 'Approvers') {
                                highlighError('#input-list-approver', validationMessages);
                            }
                        }
                    }

                }

                function isValidationResultEmpty(valResultObj) {
                    // Check if valResult is null or undefined
                    if (valResultObj === null || valResultObj === undefined) {
                        return true;
                    }

                    // Check if valResult has no properties
                    if (Object.keys(valResultObj).length === 0) {
                        return true;
                    }

                    // Check if all properties' arrays are empty
                    for (const property in valResultObj) {
                        if (valResultObj.hasOwnProperty(property) && Array.isArray(valResultObj[property]) && valResultObj[property].length > 0) {
                            return false; // At least one non-empty array found
                        }
                    }

                    // If all properties' arrays are empty or undefined, valResult is considered empty
                    return true;
                }

                function highlighError(selector, msg) {
                    let elem = $(selector);
                    let formGroupElem = elem.closest('.form-group');
                    let message = '';
                    if (Array.isArray(msg)) {
                        message = msg.reduce((accumulator, currentValue) => {
                            return accumulator + (', ' + currentValue);
                        }, '');
                    } else {
                        message = msg;
                    }
                    // remove leading comma
                    if (message.startsWith(', ')) message = message.slice(2);

                    let helpBlockElem = $('<span class="help-block">' + message + '</span>');
                    formGroupElem.find('.help-block').remove(); // remove any help-block element before adding
                    formGroupElem.append(helpBlockElem); // then add
                    formGroupElem.addClass('has-error'); // then highlight
                }


                function saveAndContinueEdit(payload, setting) {

                        headers['X-CSRF-Token'] = csrfToken;
                        headers['X-XSRF-TOKEN'] = csrfToken;
                    }

                    return new Promise(function (resolve, reject) {
                        $.ajax({
                            type: setting.method || 'POST',
                            url: setting.url,
                            contentType: setting.contentType || 'application/json',
                            headers: headers,
                            data: JSON.stringify(data),

                                resolve(response);
                            },
                            error: function (err) {

                // Utility Function
                function isNullOrEmpty(value) {
                    return value === null || // Check for null
                        (typeof value === 'object' && Object.keys(value).length === 0) || // Check for an empty object
                        (typeof value === 'string' && value.trim().length === 0); // Check for an empty string
                }

                // UI Utility Function
                function showMessage(msgType, msg, clear, selector, hiddenMsg) {
                    let className = '';
                    switch (msgType) {
                        case 'success':
                            className = 'alert-success';
                            break;
                        case 'info':
                            className = 'alert-info';
                            break;
                        case 'warning':
                            className = 'alert-warning';
                            break;
                        case 'danger':
                        case 'error':
                            className = 'alert-danger';
                            break;
                        default:
                            className = 'alert-success';

                    }

                    let msgEl = $('<li><div class="alert alert-dismissible ' + className + '">'
                        + (hiddenMsg ? '<span class="hidden">' + hiddenMsg + '</span>' : '')
                        + '<button type="button" class="close" data-dismiss="alert" aria-label="Close"><span aria-hidden="true">&times;</span></button>'
                        + msg
                        + '</div></li>');

                    if (clear) {
                        $(selector).empty();
                    }
                    DOMPurify.sanitize($(selector).append(msgEl));

                }

                // Utility function
                function downloadDocument(contentTitle, contentType, contentDataBase64) {
                    var binaryData = atob(contentDataBase64);
                    var arrayBuffer = new ArrayBuffer(binaryData.length);
                    var uint8Array = new Uint8Array(arrayBuffer);
                    for (var i = 0; i < binaryData.length; i++) {
                        uint8Array[i] = binaryData.charCodeAt(i);
                    }
                    var blob = new Blob([arrayBuffer], { type: contentType });
                    var a = document.createElement("a");
                    a.href = window.URL.createObjectURL(blob);
                    a.download = contentTitle;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                }

                // Utility function
                function parseQueryString() {
                    var queryString = window.location.search.slice(1);
                    var params = {};
                    queryString.split("&").forEach(function (pair) {
                        var parts = pair.split("=");
                        var key = decodeURIComponent(parts[0]);
                        var value = decodeURIComponent(parts[1] || "");

                        params[key] = value;
                    });
                    return params;
                }

                // UI Component
                function TemplateSearchResultItem(id, label) {
                    return $('<li class="item template-list-item" style="padding:.7em 0;" data-item-id="' + id + '" data-item-label="' + label + '">'
                        + '<a class="">' + label + '</a>'
                        + '</li>');
                }

            <script>


                document.getElementById('uploadDoc').addEventListener('change', function (event) {
                    const file = event.target.files[0];

                    if (!file || file.name.split('.').pop().toLowerCase() !== 'docx') {
                        alert("Please upload a .docx file");
                        return;
                    }

                    const reader = new FileReader();

                    reader.onload = function (event) {
                        const arrayBuffer = event.target.result;

                        mammoth.extractRawText({ arrayBuffer: arrayBuffer })
                            .then(function (result) {
                                eMemoContentEditor.setText(result.value);
                            })
                            .catch(function (err) {
                                console.error("Error reading DOCX:", err);
                            });
                    };

                    reader.readAsArrayBuffer(file);
                });
