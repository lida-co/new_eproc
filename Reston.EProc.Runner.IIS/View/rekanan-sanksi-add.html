    <script>
        cekLogin(0)

        $(function () {

            $(".dateJadwal").datetimepicker({
                format: "YYYY-MM-DD HH:mm:ss",
                //format: "DD MMMM YYYY HH:mm",
                locale: 'id',
                useCurrent: false,
                minDate: Date.now()

            });

            var vendorId = "";

            function gup(name, url) {
                if (!url) url = location.href;
                name = name.replace(/[\[]/, "\\\[").replace(/[\]]/, "\\\]");
                var regexS = "[\\?&]" + name + "=([^&#]*)";
                var regex = new RegExp(regexS);
                var results = regex.exec(url);
                return results == null ? null : results[1];
            }


            $.ajax({
                method: "POST",
                url: "Api/NilaiVendor/detailSanksiVendor?VendorId=" + gup("Id"),
                dataType: "json"
            }).done(function (data) {
                console.log(data);
                if (data.DalamMasaSanksi == 'masih') {
                    $("#sanksi").hide();
                }
            });

            $.ajax({
                method: "POST",
                url: "Api/NilaiVendor/CekVendorSanksi?VendorId=" + gup("Id"),
                dataType: "json"
            }).done(function (data) {
                var html = '';
                html = html + '<input type="text" class="form-control" id="NamaVendor" style="margin-bottom:7px;" value="' + data.NamaVendor + '" disabled>';
                $(".vendor-nama").append(html);
                //pengadaanid = data.pengadaanId;
                });

            $("#sanksi").on("click", function () {
                var e = document.getElementById("code-sanksi");
                var data = {};
                data.VendorId = gup("Id");
                data.DecisionDescription = $("#deskripsi").val();
                data.DecisionTypeCode = e.value;
                data.DecisionValidFrom = $("#berlaku").val();
                data.DecisionValidUntil = $("#kadaluarsa").val();
                console.log(data);

                $.ajax({
                    url: "Api/NilaiVendor/VendorSanksi",
                    method: "POST",
                    dataType: "json",
                    data: JSON.stringify(data),
                    contentType: 'application/json; charset=utf-8',
                    success: function (d) {
                        alert("Data Berhasil Disimpan");
                        window.location.reload();
                    },
                    error: function (errormessage) {

                    }
                });

            });

            table_list = $('#table-riwayat-sanksi').DataTable({
                "ajax": {
                    "url": 'api/NilaiVendor/ListRiwayatSanksi?VendorId=' + gup("Id"),
                    "type": 'POST',
                    "data": function (d) {
                        d.search = $("#txtcari").val();
                        d.status = "";
                    },
                    "error": function (jqXHR, textStatus, errorThrown) {
                    }
                },
                "columns": [
                    { "data": "DecisionTypeCode" },
                    { "data": "DecisionValidFrom" },
                    { "data": "DecisionValidUntil" },
                ],
                "columnDefs": [
                    {
                        "render": function (data, type, row) {
                            if (row.DecisionTypeCode == "SV01") {
                                return '<span class="label label-success" style="font-size:small;">No Warning</span>';
                            }
                            else if (row.DecisionTypeCode == "SV02") {
                                return '<span class="label label-warning" style="font-size:small;">Warning</span>';
                            }
                            else if (row.DecisionTypeCode == "SV03") {
                                return '<span class="label label-default" style="font-size:small;">Blacklist</span>';
                            }
                            else if (row.DecisionTypeCode == "SV04") {
                                return '<span class="label label-danger" style="font-size:small;">Penalty</span>';
                            }
                        },
                        "targets": 0,
                        //"orderable": false
                    },
                    {
                        "render": function (data, type, row) {
                            return moment(row.DecisionValidFrom).format("DD-MM-YYYY").toString();
                        },
                        "targets": 1,
                        //"orderable": false
                    },
                    {
                        "render": function (data, type, row) {
                            return moment(row.DecisionValidUntil).format("DD-MM-YYYY").toString();
                        },
                        "targets": 2,
                        //"orderable": false
                    },
                ],
                "serverSide": true,
                "paging": true,
                "lengthChange": false,
                "searching": false,
                "ordering": true,
                "info": true,
                "autoWidth": false,
                "responsive": true,
                "destroy": true
            });
            
            table_list2 = $('#table-riwayat-penilaian').DataTable({
                "ajax": {
                    "url": 'api/NilaiVendor/ListRiwayatPenilaian?VendorId=' + gup("Id"),
                    "type": 'POST',
                    "data": function (d) {
                        d.search = $("#txtcari").val();
                        d.status = "";
                    },
                    "error": function (jqXHR, textStatus, errorThrown) {
                    }
                },
                "columns": [
                    { "data": "JudulPengadaan" },
                    { "data": "NoPengadaan" },
                    { "data": "created" },
                    { "data": "CurrentTotal" },
                    { "data": "CurrentAverage" },
                ],
                //"columnDefs": [
                //    {
                //        "render": function (data, type, row) {
                //            if (row.DecisionTypeCode == "SV01") {
                //                return '<span class="label label-success" style="font-size:small;">No Warning</span>';
                //            }
                //            else if (row.DecisionTypeCode == "SV02") {
                //                return '<span class="label label-warning" style="font-size:small;">Warning</span>';
                //            }
                //            else if (row.DecisionTypeCode == "SV03") {
                //                return '<span class="label label-default" style="font-size:small;">Blacklist</span>';
                //            }
                //        },
                //        "targets": 0,
                //        //"orderable": false
                //    },
                //],
                "serverSide": true,
                "paging": true,
                "lengthChange": false,
                "searching": false,
                "ordering": true,
                "info": true,
                "autoWidth": false,
                "responsive": true,
                "destroy": true
            });

        });
